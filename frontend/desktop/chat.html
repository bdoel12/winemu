<script src="/js/api.js"></script>
<script src="/desktop/js/desktop-nav.js"></script>
<script>
  let socket = null, activeConvId = null, currentUser = null, activeOtherUserId = null, activeReportId = null, activeReportData = null;
  let allConversations = [];

  window.addEventListener('DOMContentLoaded', async () => {
    injectDesktopNav('chat');
    if (!isLoggedIn()) { window.location.href = '/desktop/login.html'; return; }
    currentUser = api.getUser();

    const params = new URLSearchParams(window.location.search);
    const targetConvId = params.get('conv');    // Direct conv ID — from contactOwner
    const targetUserId = params.get('user');    // Legacy fallback
    const reportId = params.get('report');      // Legacy fallback

    await loadConversations();

    if (targetConvId) {
      // Most reliable: open conversation by ID directly
      await openConv(parseInt(targetConvId));
    } else if (targetUserId) {
      await startConversation(parseInt(targetUserId), reportId ? parseInt(reportId) : null);
    }

    initSocket();
  });

  function initSocket() {
    socket = io({ auth: { token: api.getToken() } });
    if (currentUser) socket.emit('join_user_room', { user_id: currentUser.id });
    socket.on('new_message', msg => {
      if (msg.conversation_id === activeConvId) appendMessage(msg, false);
      loadConversations();
    });
    socket.on('message_deleted', data => {
      document.querySelector(`[data-msg-id="${data.message_id}"]`)?.remove();
    });
    socket.on('message_pinned', data => {
      const el = document.querySelector(`[data-msg-id="${data.message_id}"]`);
      if (el) el.setAttribute('data-pinned', data.is_pinned ? '1' : '0');
    });
  }

  async function loadConversations() {
    const res = await api.get('/chat/conversations?per_page=30');
    const list = document.getElementById('conversations-list');
    if (!res?.data?.items) { list.innerHTML = '<p class="text-center text-on-surface-variant py-12">Belum ada obrolan</p>'; return; }

    allConversations = res.data.items;
    renderConversationsList(allConversations);
  }

  function renderConversationsList(items) {
    const list = document.getElementById('conversations-list');
    list.innerHTML = items.length === 0
      ? '<p class="text-center text-on-surface-variant py-12">Belum ada obrolan</p>'
      : items.map(c => {
          const other = c.other_user;
          const av = other?.avatar_url
            ? `<img src="${other.avatar_url}" class="w-12 h-12 rounded-full object-cover mr-4">`
            : `<div class="w-12 h-12 rounded-full bg-secondary-container text-on-surface flex items-center justify-center font-bold mr-4">${(other?.full_name||other?.username||'?')[0]}</div>`;
          const unread = c.unread_count > 0 ? `<div class="w-5 h-5 bg-primary text-on-primary rounded-full flex items-center justify-center text-[10px] font-bold">${c.unread_count}</div>` : '';
          const lastMsg = c.last_message ? c.last_message.content.substring(0,40) : 'Mulai percakapan';
          const isActive = c.id === activeConvId;
          return `<div onclick="openConv(${c.id})" class="flex items-center p-3 rounded-2xl ${isActive ? 'bg-primary-fixed/20' : 'hover:bg-surface-container-low'} transition-colors cursor-pointer mb-1 relative">
            ${isActive ? '<div class="absolute left-0 top-1/2 -translate-y-1/2 w-1 h-8 bg-primary rounded-r-full"></div>' : ''}
            ${av}
            <div class="flex-1 min-w-0">
              <div class="flex justify-between items-baseline mb-1">
                <h3 class="font-body-md font-semibold text-on-surface truncate">${other?.full_name||other?.username||'Pengguna'}</h3>
                <span class="font-label-caps text-[12px] ${c.unread_count>0?'text-primary font-bold':'text-outline'} shrink-0 ml-2">${c.last_message_at?timeAgo(c.last_message_at):''}</span>
              </div>
              <div class="flex items-center justify-between gap-2">
                <p class="text-on-surface-variant text-sm truncate ${c.unread_count>0?'font-semibold text-on-surface':''}">${lastMsg}</p>
                ${unread}
              </div>
            </div>
          </div>`;
        }).join('');
  }

  function filterConversations() {
    const q = document.getElementById('conv-search').value.toLowerCase();
    const filtered = allConversations.filter(c => {
      const name = (c.other_user?.full_name || c.other_user?.username || '').toLowerCase();
      const msg = (c.last_message?.content || '').toLowerCase();
      return name.includes(q) || msg.includes(q);
    });
    renderConversationsList(filtered);
  }

  async function startConversation(userId, reportId) {
    const uid = parseInt(userId);
    const rid = reportId ? parseInt(reportId) : null;
    if (!uid || isNaN(uid)) { showToast('ID pengguna tidak valid'); return; }
    
    const res = await api.post('/chat/conversations', { user_id: uid, report_id: rid });
    
    if (res?.data?.conversation) {
      const conv = res.data.conversation;
      if (!allConversations.find(c => c.id === conv.id)) {
        allConversations = [conv, ...allConversations];
      }
      renderConversationsList(allConversations);
      await openConv(conv.id);
    } else if (res?.status === 'error') {
      showToast(res?.message || 'Gagal membuka percakapan', 'error');
    } else {
      // Mungkin response kosong atau format berbeda — coba load conversations
      await loadConversations();
      showToast('Percakapan dibuka', 'success');
    }
  }

  async function openConv(convId) {
    activeConvId = convId;
    renderedMessageIds = new Set();
    document.getElementById('conv-empty-state').style.display = 'none';
    document.getElementById('conv-view').style.display = 'flex';
    document.getElementById('conv-view').classList.remove('hidden');
    document.getElementById('conv-view').classList.add('flex', 'flex-col');

    if (socket) socket.emit('join_conversation', { conversation_id: convId });

    // Try local first, fallback to server fetch
    let conv = allConversations.find(c => c.id === convId) || null;
    if (!conv) {
      const convRes = await api.get(`/chat/conversations?per_page=50`);
      if (convRes?.data?.items) {
        allConversations = convRes.data.items;
        conv = allConversations.find(c => c.id === convId);
      }
    }

    if (conv?.other_user) {
      activeOtherUserId = conv.other_user.id;
    }

    activeReportData = conv?.report || null;
    activeReportId = activeReportData?.id || null;

    const thumbEl = document.getElementById('conv-item-thumb');
    const titleEl = document.getElementById('conv-item-title');
    const statusEl = document.getElementById('conv-item-status');

    if (activeReportData) {
      thumbEl.innerHTML = activeReportData.primary_image
        ? `<img src="${activeReportData.primary_image}" class="w-full h-full object-cover">`
        : `<div class="w-full h-full flex items-center justify-center bg-primary-container text-white"><span class="material-symbols-outlined text-[18px]">inventory_2</span></div>`;
      titleEl.textContent = activeReportData.title;
      titleEl.onclick = () => window.location.href = `/desktop/report-detail.html?id=${activeReportId}`;
      const statusLabel = { aktif: 'Menunggu Verifikasi', proses: 'Dalam Proses Klaim', selesai: 'Selesai', ditutup: 'Ditutup' }[activeReportData.status] || '';
      statusEl.textContent = statusLabel;
    } else if (conv?.other_user) {
      const other = conv.other_user;
      thumbEl.innerHTML = other.avatar_url
        ? `<img src="${other.avatar_url}" class="w-full h-full object-cover">`
        : `<div class="w-full h-full flex items-center justify-center bg-primary-container text-white font-bold">${(other.full_name||other.username||'?')[0].toUpperCase()}</div>`;
      titleEl.textContent = other.full_name || other.username;
      statusEl.textContent = 'Aktif';
    }

    const msgRes = await api.get(`/chat/conversations/${convId}/messages?per_page=50`);
    const area = document.getElementById('messages-area');
    area.innerHTML = '<div class="flex justify-center"><span class="px-4 py-1 bg-surface-container-high rounded-full text-[12px] font-semibold text-on-surface-variant uppercase tracking-wider">Hari Ini</span></div>';
    if (msgRes?.data?.items) {
      msgRes.data.items.forEach(m => appendMessage(m, false));
    }

    if (activeReportData && activeReportData.status === 'aktif' && currentUser?.id !== activeReportData.owner_id) {
      appendSystemVerifyBubble();
    }

    area.scrollTop = area.scrollHeight;
    renderConversationsList(allConversations);
  }

  async function sendMessage() {
    if (!activeConvId) return;
    const input = document.getElementById('msg-input');
    const content = input.value.trim();
    // Allow send if there's text OR pending files
    if (!content && pendingFiles.length === 0) return;
    input.value = '';

    // Upload files first if any
    if (pendingFiles.length > 0) {
      for (const file of [...pendingFiles]) {
        const fd = new FormData();
        fd.append('file', file);
        fd.append('conversation_id', activeConvId);
        try { await api.postForm('/chat/upload-file', fd); } catch(e) { showToast('Gagal upload: ' + file.name); }
      }
      pendingFiles = [];
      renderFilePreview();
    }

    if (!content) return; // files only, no text message needed
    const payload = { content };
    if (activeReplyMsgId) {
      payload.reply_to_id = activeReplyMsgId;
      const replyEl = document.querySelector(`[data-msg-id="${activeReplyMsgId}"]`);
      const senderEl = replyEl ? replyEl.querySelector('[data-sender-name]') : null;
      payload.reply_to_content = senderEl ? senderEl.textContent.trim() : (replyEl ? replyEl.querySelector('p')?.textContent.trim() : '');
      payload.reply_to_sender = document.getElementById('reply-preview-sender')?.textContent?.replace('Membalas ','') || '';
    }
    cancelReply();
    const res = await api.post(`/chat/conversations/${activeConvId}/messages`, payload);
    if (res?.data?.message) {
      appendMessage(res.data.message, true);
    }
  }
  // ── Emoji ──────────────────────────────────────────────────────────────────
  const EMOJIS = ['😊','😂','❤️','👍','🙏','😍','🎉','😭','😅','🥰','🔥','✨','😎','🤔','😢','👏','🥲','😄','🤣','💪','🙌','😬','🫶','🥳','😇','🤩','😁','😆','🫠','😴','🥺','😮','😱','😤','🤦','🙄','😏','🥴','😌','🫡','👋','🤝','💯','⭐','🎊','🎶','📸','🏆','✅','❌'];
  let emojiInited = false;
  function toggleEmojiPicker() {
    const p = document.getElementById('emoji-picker');
    p.classList.toggle('hidden');
    if (!emojiInited) {
      document.getElementById('emoji-grid').innerHTML = EMOJIS.map(e =>
        `<button type="button" onclick="insertEmoji('${e}')" style="background:none;border:none;cursor:pointer;padding:2px;border-radius:4px;font-size:1.2rem;" onmouseover="this.style.background='#f0ede9'" onmouseout="this.style.background='none'">${e}</button>`
      ).join('');
      emojiInited = true;
    }
  }
  function insertEmoji(emoji) {
    const inp = document.getElementById('msg-input');
    const pos = inp.selectionStart || inp.value.length;
    inp.value = inp.value.slice(0, pos) + emoji + inp.value.slice(inp.selectionEnd || pos);
    inp.focus();
    document.getElementById('emoji-picker').classList.add('hidden');
  }
  document.addEventListener('click', e => {
    const p = document.getElementById('emoji-picker');
    if (p && !p.contains(e.target) && !e.target.closest('[onclick="toggleEmojiPicker()"]')) p.classList.add('hidden');
  });

  // ── File Attach ──────────────────────────────────────────────────────────────
  let pendingFiles = [];
  function handleFileAttach(e) {
    Array.from(e.target.files).forEach(f => pendingFiles.push(f));
    renderFilePreview();
    e.target.value = '';
  }
  function renderFilePreview() {
    const bar = document.getElementById('file-preview-bar');
    if (!pendingFiles.length) { bar.style.display = 'none'; bar.innerHTML = ''; return; }
    bar.style.display = 'flex';
    bar.innerHTML = pendingFiles.map((f, i) => {
      const isImg = f.type.startsWith('image/');
      const thumb = isImg
        ? `<img src="${URL.createObjectURL(f)}" style="width:36px;height:36px;object-fit:cover;border-radius:6px;">`
        : `<span class="material-symbols-outlined" style="color:#1a373b;font-size:24px;">description</span>`;
      return `<div style="display:flex;align-items:center;gap:6px;background:#f0ede9;border-radius:10px;padding:4px 8px;border:1px solid #c1c8c9;">
        ${thumb}
        <span style="font-size:11px;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${f.name}</span>
        <button type="button" onclick="removePendingFile(${i})" style="background:none;border:none;cursor:pointer;color:#727879;font-size:14px;line-height:1;">✕</button>
      </div>`;
    }).join('');
  }
  function removePendingFile(idx) { pendingFiles.splice(idx, 1); renderFilePreview(); }

  let localStream = null;
  function buildCallModal() {
    if (document.getElementById('call-modal')) return;
    const m = document.createElement('div');
    m.id = 'call-modal';
    m.style.cssText = 'display:none;position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:10000;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;';
    m.innerHTML = `
      <div id="call-vid-wrap" style="display:flex;gap:1rem;align-items:center;justify-content:center;width:100%;padding:0 2rem;">
        <video id="local-video" autoplay muted playsinline style="width:30%;max-width:280px;border-radius:1rem;border:2px solid #314e52;background:#000;"></video>
        <video id="remote-video" autoplay playsinline style="width:60%;max-width:560px;border-radius:1rem;background:#000;"></video>
      </div>
      <div id="call-audio-wrap" style="display:none;flex-direction:column;align-items:center;gap:0.75rem;">

        <p id="call-peer-name" style="color:#fff;font-weight:700;font-size:1.1rem;"></p>

          <span class="material-symbols-outlined">mic</span>
        </button>
        <button onclick="endCall()" style="width:56px;height:56px;border-radius:50%;background:#ef4444;border:none;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;">
          <span class="material-symbols-outlined">call_end</span>

        <button id="btn-cam" onclick="toggleCamera()" style="width:56px;height:56px;border-radius:50%;background:rgba(255,255,255,0.2);border:none;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;">

  async function startVideoCall() {
    if (!activeConvId) { showToast('Pilih percakapan terlebih dahulu'); return; }
    buildCallModal();
    document.getElementById('call-modal').style.display = 'flex';
    document.getElementById('call-vid-wrap').style.display = 'flex';
    document.getElementById('call-audio-wrap').style.display = 'none';
    document.getElementById('call-peer-name').textContent = document.getElementById('conv-item-title')?.textContent || '';
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
      document.getElementById('local-video').srcObject = localStream;
      showToast('📹 Video call dimulai');
    } catch(e) { showToast('Butuh izin kamera & mikrofon'); endCall(); }
  }

  async function startVoiceCall() {
    if (!activeConvId) { showToast('Pilih percakapan terlebih dahulu'); return; }
    buildCallModal();
    document.getElementById('call-modal').style.display = 'flex';
    document.getElementById('call-vid-wrap').style.display = 'none';
    document.getElementById('call-audio-wrap').style.display = 'flex';
    document.getElementById('call-peer-name').textContent = document.getElementById('conv-item-title')?.textContent || '';
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: false, audio: true });
      showToast('📞 Sedang menelepon...');
    } catch(e) { showToast('Butuh izin mikrofon'); endCall(); }
  }

  function endCall() {
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    const m = document.getElementById('call-modal');
    if (m) m.style.display = 'none';
    showToast('Panggilan diakhiri');
  }

  function toggleMute() {
    if (!localStream) return;
    const t = localStream.getAudioTracks()[0];
    if (!t) return;
    t.enabled = !t.enabled;
    const btn = document.getElementById('btn-mute');
    btn.querySelector('span').textContent = t.enabled ? 'mic' : 'mic_off';
    btn.style.background = t.enabled ? 'rgba(255,255,255,0.2)' : 'rgba(239,68,68,0.7)';
  }

  function toggleCamera() {
    if (!localStream) return;
    const t = localStream.getVideoTracks()[0];
    if (!t) return;
    t.enabled = !t.enabled;
    const btn = document.getElementById('btn-cam');
    btn.querySelector('span').textContent = t.enabled ? 'videocam' : 'videocam_off';
  }

  function deleteConvConfirm() {
    if (!activeConvId) { showToast('Tidak ada percakapan aktif'); return; }
    showConfirmDialog(
      'Hapus Chat dengan Pengguna',
      'Seluruh percakapan dengan pengguna ini akan dihapus dan hilang dari daftar obrolan. Lanjutkan?',
      'delete', 'error',
      async () => {
        const convIdToDelete = activeConvId;
        try { await api.delete(`/chat/conversations/${convIdToDelete}`); } catch(e) {}
        allConversations = (allConversations || []).filter(c => String(c.id) !== String(convIdToDelete));
        activeConvId = null; activeOtherUserId = null; activeReportId = null; activeReportData = null;
        const cv = document.getElementById('conv-view');
        const es = document.getElementById('conv-empty-state');
        if (cv) { cv.style.display = 'none'; cv.classList.add('hidden'); }
        if (es) { es.style.display = ''; es.classList.remove('hidden'); }
        renderConversationsList(allConversations);
        showToast('Chat berhasil dihapus');
      }
    );
  }

    showConfirmDialog(
      'Blokir Pengguna',
      'Pengguna ini tidak akan bisa mengirim pesan kepada Anda. Lanjutkan?',
      'block', 'error',
      async () => {
        const res = await api.post(`/users/${activeOtherUserId}/block`);
        showToast(res?.status === 'success' ? 'Pengguna diblokir' : 'Fitur belum tersedia');
      }
    );
  }

  function reportUserConfirm() {
    if (!activeOtherUserId) return;
    showConfirmDialog(
      'Laporkan Pengguna',
      'Laporkan pengguna ini karena perilaku tidak pantas atau pelanggaran. Lanjutkan?',
      'flag', 'error',
      async () => {
        const res = await api.post(`/users/${activeOtherUserId}/report`);
        showToast(res?.status === 'success' ? 'Laporan terkirim' : 'Fitur belum tersedia');
      }
    );
  }

  // ── Message Context Menu (dot button) ────────────────────────────────────
  let openMsgMenuId = null;
  function toggleMsgMenu(menuId, btnId, isOwn, event) {
    if (event) event.stopPropagation();
    if (openMsgMenuId && openMsgMenuId !== menuId) {
      document.getElementById(openMsgMenuId)?.classList.add('hidden');
    }
    const menu = document.getElementById(menuId);
    if (!menu) return;
    menu.classList.toggle('hidden');
    openMsgMenuId = menu.classList.contains('hidden') ? null : menuId;
  }
  function closeMsgMenu(menuId) {
    document.getElementById(menuId)?.classList.add('hidden');
    if (openMsgMenuId === menuId) openMsgMenuId = null;
  }
  document.addEventListener('click', e => {
    if (openMsgMenuId) {
      const menu = document.getElementById(openMsgMenuId);
      if (menu && !menu.contains(e.target) && !e.target.closest('[id^="dot-btn-"]')) {
        menu.classList.add('hidden');
        openMsgMenuId = null;
      }
    }
  });

  // ── Active reply state ───────────────────────────────────────────────────
  let activeReplyMsgId = null;

  function replyToMessage(msgId) {
    const msgEl = document.querySelector(`[data-msg-id="${msgId}"]`);
    const senderEl = msgEl ? msgEl.querySelector('[data-sender-name]') : null;
    const senderName = senderEl ? senderEl.getAttribute('data-sender-name') : 'Pengguna';
    // Get last <p> in bubble to skip any quoted reply context
    const bubble = msgEl?.querySelector('.bg-primary-container, .bg-surface-container-low');
    const allP = bubble ? bubble.querySelectorAll('p') : [];
    const msgText = allP.length > 0 ? allP[allP.length - 1].textContent.trim() : (senderEl ? senderEl.textContent.trim() : '');
    activeReplyMsgId = msgId;
    document.getElementById('reply-preview-bar').style.display = '';
    document.getElementById('reply-preview-sender').textContent = 'Membalas ' + senderName;
    document.getElementById('reply-preview-content').textContent = msgText || '...';
    document.getElementById('msg-input').focus();
  }

  function cancelReply() {
    activeReplyMsgId = null;
    document.getElementById('reply-preview-bar').style.display = 'none';
    document.getElementById('reply-preview-sender').textContent = '';
    document.getElementById('reply-preview-content').textContent = '';
  }

  async function pinMessage(msgId) {
    try {
      const res = await api.post(`/chat/messages/${msgId}/pin`);
      if (res?.data) {
        const isPinned = res.data.is_pinned;
        // Update pin button icon if visible
        const pinBtn = document.querySelector(`[data-pin-btn="${msgId}"]`);
        if (pinBtn) pinBtn.querySelector('span').textContent = isPinned ? 'keep' : 'push_pin';
        showToast(isPinned ? 'Pesan disematkan' : 'Pesan dilepas dari sematkan');
      } else {
        showToast('Gagal menyematkan pesan');
      }
    } catch(e) { showToast('Gagal menyematkan pesan'); }
  }

  function copyMessage(msgId) {
    const msgEl = document.querySelector(`[data-msg-id="${msgId}"]`);
    const msgText = msgEl ? msgEl.querySelector('p')?.textContent : '';
    if (msgText) {
      navigator.clipboard.writeText(msgText).then(() => showToast('Pesan disalin')).catch(() => {
        // Fallback for non-HTTPS
        const ta = document.createElement('textarea');
        ta.value = msgText; document.body.appendChild(ta); ta.select();
        document.execCommand('copy'); ta.remove(); showToast('Pesan disalin');
      });
    }
  }

  function deleteMessageConfirm(msgId) {
    if (!msgId) return;
    showConfirmDialog(
      'Hapus Pesan',
      'Pesan ini akan dihapus secara permanen. Lanjutkan?',
      'delete', 'error',
      async () => {
        try {
          await api.delete(`/chat/messages/${msgId}`);
        } catch(e) {}
        const el = document.querySelector(`[data-msg-id="${msgId}"]`);
        if (el) el.remove();
        showToast('Pesan dihapus');
      }
    );
  }

  // ── Select Mode ────────────────────────────────────────────────────────────
  let selectModeActive = false;
  let selectedMsgIds = new Set();

  function enterSelectMode() {
    selectModeActive = true;
    selectedMsgIds.clear();
    // Inject select toolbar
    const toolbar = document.createElement('div');
    toolbar.id = 'select-toolbar';
    toolbar.style.cssText = 'position:sticky;bottom:0;background:#314E52;color:#fff;display:flex;align-items:center;justify-content:space-between;padding:12px 16px;gap:12px;z-index:40;';
    toolbar.innerHTML = `
      <span id="select-count" style="font-size:14px;font-weight:600;">0 dipilih</span>
      <div style="display:flex;gap:8px;">
        <button onclick="deleteSelectedMessages()" style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.15);border:none;color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;">
          <span class="material-symbols-outlined" style="font-size:18px;">delete</span>Hapus
        </button>
        <button onclick="exitSelectMode()" style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.1);border:none;color:#fff;padding:6px 14px;border-radius:20px;cursor:pointer;font-size:13px;">
          Batal
        </button>
      </div>`;
    document.getElementById('conv-view').appendChild(toolbar);

    // Add checkboxes to all messages
    document.querySelectorAll('[data-msg-id]').forEach(msgEl => {
      const msgId = msgEl.getAttribute('data-msg-id');
      if (!msgId) return;
      const cb = document.createElement('div');
      cb.className = 'select-checkbox';
      cb.setAttribute('data-cb-id', msgId);
      cb.style.cssText = 'width:20px;height:20px;border-radius:50%;border:2px solid #c1c8c9;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s;';
      cb.onclick = () => toggleSelectMsg(msgId, cb);
      msgEl.style.cursor = 'pointer';
      msgEl.prepend(cb);
    });

    showToast('Mode pilih aktif — ketuk pesan untuk memilih');
  }

  function toggleSelectMsg(msgId, cbEl) {
    if (selectedMsgIds.has(msgId)) {
      selectedMsgIds.delete(msgId);
      cbEl.style.background = 'transparent';
      cbEl.style.borderColor = '#c1c8c9';
      cbEl.innerHTML = '';
    } else {
      selectedMsgIds.add(msgId);
      cbEl.style.background = '#1a373b';
      cbEl.style.borderColor = '#1a373b';
      cbEl.innerHTML = '<span class="material-symbols-outlined" style="font-size:13px;color:#fff;">check</span>';
    }
    document.getElementById('select-count').textContent = `${selectedMsgIds.size} dipilih`;
  }

  function exitSelectMode() {
    selectModeActive = false;
    selectedMsgIds.clear();
    document.getElementById('select-toolbar')?.remove();
    document.querySelectorAll('.select-checkbox').forEach(cb => cb.remove());
    document.querySelectorAll('[data-msg-id]').forEach(el => el.style.cursor = '');
  }

  async function deleteSelectedMessages() {
    if (selectedMsgIds.size === 0) { showToast('Pilih pesan terlebih dahulu'); return; }
    showConfirmDialog(
      'Hapus Pesan Terpilih',
      `${selectedMsgIds.size} pesan akan dihapus secara permanen. Lanjutkan?`,
      'delete', 'error',
      async () => {
        const ids = [...selectedMsgIds];
        for (const msgId of ids) {
          try { await api.delete(`/chat/messages/${msgId}`); } catch(e) {}
          document.querySelector(`[data-msg-id="${msgId}"]`)?.remove();
        }
        exitSelectMode();
        showToast(`${ids.length} pesan dihapus`);
      }
    );
  }

  // ── Confirm Dialog Helper ─────────────────────────────────────────────────
  function showConfirmDialog(title, message, icon, iconColor, onConfirm) {
    let existing = document.getElementById('confirm-dialog');
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.id = 'confirm-dialog';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:9999;display:flex;align-items:center;justify-content:center;padding:1rem;';
    const colorMap = { error: '#ba1a1a', primary: '#1a373b' };
    const c = colorMap[iconColor] || '#1a373b';
    overlay.innerHTML = `
      <div style="background:#fff;border-radius:20px;padding:24px;max-width:340px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.2);">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
          <span class="material-symbols-outlined" style="font-size:24px;color:${c};">${icon}</span>
          <h3 style="font-weight:700;font-size:16px;color:#1c1c19;">${title}</h3>
        </div>
        <p style="font-size:14px;color:#414849;line-height:1.6;margin-bottom:20px;">${message}</p>
        <div style="display:flex;gap:10px;justify-content:flex-end;">
          <button onclick="document.getElementById('confirm-dialog').remove()" style="padding:8px 18px;border:1px solid #c1c8c9;border-radius:20px;background:transparent;cursor:pointer;font-size:13px;color:#414849;">Batal</button>
          <button id="confirm-ok-btn" style="padding:8px 18px;border:none;border-radius:20px;background:${c};color:#fff;cursor:pointer;font-size:13px;font-weight:600;">Lanjutkan</button>
        </div>
      </div>`;
    overlay.querySelector('#confirm-ok-btn').onclick = (e) => {
      e.stopPropagation();
      overlay.remove();
      onConfirm();
    };
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
    document.body.appendChild(overlay);
  }

  // ── Toast Helper ──────────────────────────────────────────────────────────
  function showToast(msg) {
    let t = document.getElementById('toast-msg');
    if (!t) {
      t = document.createElement('div');
      t.id = 'toast-msg';
      t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a373b;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:99999;transition:opacity 0.3s;pointer-events:none;';
      document.body.appendChild(t);
    }
    t.textContent = msg;
    t.style.opacity = '1';
    clearTimeout(t._to);
    t._to = setTimeout(() => { t.style.opacity = '0'; }, 2500);
  }

</script>
</body>
