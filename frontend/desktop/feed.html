<script>
  if (!isLoggedIn()) window.location.href = '/desktop/login.html';

  let page = 1, loading = false, hasMore = true, currentFilter = 'all';

  window.addEventListener('DOMContentLoaded', () => {
    injectDesktopNav('home');
    loadFeed();
    setupInfiniteScroll();
    loadNearbyUsers();
    loadMiniProfile();
    loadCommunityStats();
  });

  function setFilter(filter) {
    currentFilter = filter;
    page = 1; hasMore = true;
    document.getElementById('feed-container').innerHTML = '';
    ['all', 'hilang', 'ditemukan'].forEach(f => {
      const btn = document.getElementById('filter-' + f);
      if (f === filter) btn.className = 'px-5 py-2 rounded-full font-label-caps text-label-caps bg-primary-container text-white transition-all';
      else btn.className = 'px-5 py-2 rounded-full font-label-caps text-label-caps text-on-surface-variant hover:bg-surface-container transition-all';
    });
    loadFeed();
  }

  async function loadFeed() {
    if (loading || !hasMore) return;
    loading = true;
    document.getElementById('loading-dots').style.display = 'flex';

    let url = `/reports?page=${page}&per_page=6`;
    if (currentFilter !== 'all') url += `&type=${currentFilter}`;

    const res = await api.get(url);
    loading = false;

    if (res && res.status === 'success') {
      const { items, pagination } = res.data;
      hasMore = pagination.has_next;
      if (!hasMore) document.getElementById('loading-dots').style.display = 'none';
      renderCards(items);
      page++;
    } else {
      document.getElementById('loading-dots').style.display = 'none';
    }
  }

  function renderCards(items) {
    const container = document.getElementById('feed-container');
    items.forEach(r => {
      const card = document.createElement('article');
      card.className = 'bg-surface-container-lowest rounded-3xl shadow-soft overflow-hidden';
      const badgeColor = r.type === 'hilang' ? '#ba1a1a' : '#7d562d';
      const badgeText = r.type === 'hilang' ? 'HILANG' : 'DITEMUKAN';
      const timeStr = timeAgo(r.created_at);
      const avatar = r.author?.avatar_url
        ? `<img src="${r.author.avatar_url}" alt="${r.author.full_name}" class="w-10 h-10 rounded-full object-cover">`
        : `<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-white font-bold">${(r.author?.full_name || r.author?.username || '?')[0].toUpperCase()}</div>`;

      // Build full carousel from media array, fall back to primary_image/video
      const mediaItems = (r.media && r.media.length > 0) ? r.media : (
        r.primary_image ? [{ type: 'image', url: r.primary_image }] :
        r.primary_video ? [{ type: 'video', url: r.primary_video }] : []
      );
      const carouselId = `carousel-${r.id}`;
      const hasDots = mediaItems.length > 1;
      const slides = mediaItems.map((m, i) =>
        m.type === 'image'
          ? `<img src="${m.url}" alt="${r.title}" class="feed-slide w-full h-[400px] object-cover flex-shrink-0" style="min-width:100%;pointer-events:none;" draggable="false">`
          : `<video src="${m.url}" class="feed-slide w-full h-[400px] object-cover flex-shrink-0" style="min-width:100%;pointer-events:none;" draggable="false" muted playsinline autoplay loop preload="auto" id="vid-${r.id}-${m.url.slice(-8)}" onclick="toggleVideoSound(this)"></video>`
      ).join('');
      const dots = hasDots
        ? `<div class="absolute bottom-3 left-0 right-0 flex justify-center gap-1.5 pointer-events-none">
            ${mediaItems.map((_, i) => `<span class="carousel-dot w-1.5 h-1.5 rounded-full transition-all duration-300 ${i===0?'bg-white w-3':'bg-white/50'}"></span>`).join('')}
           </div>` : '';
      const arrowBtns = mediaItems.length > 1 ? `
        <button class="carousel-arrow prev arrow-disabled" onclick="carouselPrev('${carouselId}',${mediaItems.length},event)">&#8249;</button>
        <button class="carousel-arrow next" onclick="carouselNext('${carouselId}',${mediaItems.length},event)">&#8250;</button>` : '';
      const mediaHtml = mediaItems.length > 0
        ? `<div class="relative overflow-hidden carousel-wrap" style="height:400px;">
            <div id="${carouselId}" class="flex h-full transition-transform duration-300 ease-in-out" data-idx="0" style="will-change:transform;">${slides}</div>
            ${hasDots ? dots : ''}
            ${arrowBtns}
           </div>`
        : `<div class="w-full h-[400px] flex items-center justify-center bg-surface-container"><span class="material-symbols-outlined text-6xl text-outline">image_not_supported</span></div>`;

      card.innerHTML = `
        <div class="p-4 flex items-center justify-between">
          <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='/desktop/user-profile.html?id=${r.user_id}'">
            ${avatar}
            <div>
              <p class="font-body-md text-body-md font-semibold text-primary">${r.author?.full_name || r.author?.username || 'Pengguna'}</p>
              <p class="text-label-caps font-label-caps text-on-surface-variant">${r.location_name || 'Lokasi tidak diketahui'} • ${timeStr}</p>
            </div>
          </div>
          <div class="relative">
            <button onclick="toggleReportMenu(event, ${r.id})" class="text-on-surface-variant hover:text-primary p-1 rounded-full hover:bg-surface-container-low transition-colors"><span class="material-symbols-outlined">more_horiz</span></button>
          </div>
        </div>
        <div class="relative cursor-pointer" onclick="openReport(${r.id})">
          ${mediaHtml}
          <div class="absolute top-4 left-4 text-white px-3 py-1 rounded-full text-label-caps font-label-caps shadow-sm" style="background:${badgeColor};">${badgeText}</div>
        </div>
        <div class="p-4">
          <div class="flex justify-between items-center mb-3">
            <div class="flex gap-4">
              <button class="like-btn text-on-surface hover:text-error icon-hover" onclick="toggleLike(${r.id}, this)" data-liked="${r.is_liked}">
                <span class="material-symbols-outlined" style="font-variation-settings:'FILL' ${r.is_liked ? '1' : '0'};${r.is_liked ? 'color:#ba1a1a;' : ''}">favorite</span>
              </button>
              <button class="text-on-surface hover:text-primary icon-hover" onclick="animBtn(this); openReport(${r.id})"><span class="material-symbols-outlined">chat_bubble</span></button>
              <div class="relative">
                <button class="text-on-surface hover:text-primary icon-hover" data-rid="${r.id}" data-title="${(r.title||'').replace(/"/g,'&quot;')}" data-loc="${r.location_name||''}" onclick="animBtn(this); toggleShareMenu(event, ${r.id}, '${(r.title||'').replace(/'/g,'')}', '${r.location_name||''}')">
                  <span class="material-symbols-outlined">send</span>
                </button>
              </div>
            </div>
            <button class="bookmark-btn icon-hover transition-colors" style="color:${r.is_bookmarked?'#7d562d':'inherit'}" onclick="toggleBookmark(${r.id}, this)">
              <span class="material-symbols-outlined">${r.is_bookmarked?'bookmark':'bookmark_border'}</span>
            </button>
          </div>
          <p class="text-body-sm font-body-sm font-semibold mb-1">${r.like_count || 0} suka</p>
          <p class="font-body-md text-body-md text-on-surface mb-2">
            <a href="/desktop/user-profile.html?id=${r.user_id}" class="font-semibold hover:underline mr-2" style="color:#7d562d;">${r.author?.full_name || r.author?.username || 'Pengguna'}</a>
            <span class="font-bold">${r.title}</span> ${r.description ? r.description.substring(0,140) + (r.description.length>140?'...':'') : ''}
          </p>
          <button onclick="openReport(${r.id})" class="text-body-sm font-body-sm text-on-surface-variant hover:text-primary mb-2">Lihat semua ${r.comment_count || 0} komentar</button>
        </div>`;
      container.appendChild(card);
    });
  }

  // ── Carousel swipe logic ─────────────────────────────────────────────────

  // ── Carousel (rewrite) ────────────────────────────────────────────────────
  // Menggantikan initCarousels() sebelumnya dengan versi yang lebih robust
  function initCarousels() {
    document.querySelectorAll('[id^="carousel-"]').forEach(track => {
      if (track.dataset.init) return;
      track.dataset.init = '1';
      const wrap = track.parentElement; // .relative.overflow-hidden
      const total = track.children.length;
      if (total <= 1) return;

      let startX = 0, curX = 0, dragging = false;

      function getIdx() { return parseInt(track.getAttribute('data-idx')) || 0; }

      function goTo(idx) {
        idx = Math.max(0, Math.min(total - 1, idx));
        track.setAttribute('data-idx', idx);
        track.style.transition = 'transform 0.3s ease';
        track.style.transform = 'translateX(-' + (idx * 100) + '%)';
        wrap.querySelectorAll('.carousel-dot').forEach(function(d, i) {
          d.style.width = i === idx ? '14px' : '6px';
          d.style.opacity = i === idx ? '1' : '0.55';
        });
        // Update arrow visibility saat swipe
        var prevBtn = wrap.querySelector('.carousel-arrow.prev');
        var nextBtn = wrap.querySelector('.carousel-arrow.next');
        if (prevBtn) { idx === 0 ? prevBtn.classList.add('arrow-disabled') : prevBtn.classList.remove('arrow-disabled'); }
        if (nextBtn) { idx === total - 1 ? nextBtn.classList.add('arrow-disabled') : nextBtn.classList.remove('arrow-disabled'); }
      }

      function onStart(x) { startX = x; curX = x; dragging = true; track.style.transition = 'none'; }
      function onMove(x) {
        if (!dragging) return;
        curX = x;
        var diff = x - startX;
        track.style.transform = 'translateX(calc(-' + (getIdx() * 100) + '% + ' + diff + 'px))';
      }
      function onEnd(x) {
        if (!dragging) return;
        dragging = false;
        var diff = x - startX;
        if (Math.abs(diff) > 35) goTo(getIdx() + (diff < 0 ? 1 : -1));
        else goTo(getIdx());
      }

      // Mouse
      wrap.addEventListener('mousedown', function(e) { onStart(e.clientX); e.preventDefault(); });
      window.addEventListener('mousemove', function(e) { if (dragging) onMove(e.clientX); });
      window.addEventListener('mouseup', function(e) { if (dragging) onEnd(e.clientX); });

      // Touch
      wrap.addEventListener('touchstart', function(e) { onStart(e.touches[0].clientX); }, { passive: true });
      wrap.addEventListener('touchmove', function(e) { onMove(e.touches[0].clientX); }, { passive: true });
      wrap.addEventListener('touchend', function(e) { onEnd(e.changedTouches[0].clientX); }, { passive: true });

      // Disable img/video native drag
      track.querySelectorAll('img,video').forEach(function(el) {
        el.setAttribute('draggable', 'false');
        el.style.pointerEvents = 'none';
        el.style.userSelect = 'none';
      });
      // Tombol prev sudah punya arrow-disabled dari HTML (mulai index 0), tidak perlu setTimeout
    });
  }



  function setupInfiniteScroll() {
    const observer = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) loadFeed();
    }, { threshold: 0.5 });
    observer.observe(document.getElementById('load-more-trigger'));
  }

  async function toggleLike(reportId, btn) {
    const wasLiked = btn.dataset.liked === 'true';
    const res = await api.post(`/reports/${reportId}/like`);
    if (res?.status === 'success') {
      const nowLiked = !wasLiked;
      btn.dataset.liked = nowLiked;
      const icon = btn.querySelector('.material-symbols-outlined');
      icon.style.fontVariationSettings = `'FILL' ${nowLiked ? 1 : 0}`;
      icon.style.color = nowLiked ? '#ba1a1a' : '';
    }
  }




  function toggleVideoSound(video) {
    if (!video || video.tagName !== 'VIDEO') return;
    video.muted = !video.muted;
    // update button icon
    const btn = video.closest('.relative')?.querySelector('.sound-btn');
    if (btn) {
      btn.querySelector('span').textContent = video.muted ? 'volume_off' : 'volume_up';
    }
  }

  // Show sound button when carousel has a video
  function checkVideoSlides() {
    document.querySelectorAll('[id^="carousel-"]').forEach(track => {
      const hasVideo = track.querySelector('video');
      if (hasVideo) {
        const btn = track.closest('.relative')?.querySelector('.sound-btn');
        if (btn) btn.style.display = 'flex';
      }
    });
  }


  // ── Carousel prev/next arrows ─────────────────────────────────────────────
  function carouselGoTo(trackId, idx, total) {
    const track = document.getElementById(trackId);
    if (!track) return;
    idx = Math.max(0, Math.min(total - 1, idx));
    track.setAttribute('data-idx', idx);
    track.style.transition = 'transform 0.3s ease';
    track.style.transform = 'translateX(-' + (idx * 100) + '%)';
    track.closest('.carousel-wrap')?.querySelectorAll('.carousel-dot').forEach(function(d, i) {
      d.style.width  = i === idx ? '14px' : '6px';
      d.style.opacity = i === idx ? '1' : '0.55';
    });
    // Update arrow visibility: sembunyikan prev di slide pertama, next di slide terakhir
    const wrap = track.closest('.carousel-wrap');
    if (wrap) {
      const prevBtn = wrap.querySelector('.carousel-arrow.prev');
      const nextBtn = wrap.querySelector('.carousel-arrow.next');
      if (prevBtn) { idx === 0 ? prevBtn.classList.add('arrow-disabled') : prevBtn.classList.remove('arrow-disabled'); }
      if (nextBtn) { idx === total - 1 ? nextBtn.classList.add('arrow-disabled') : nextBtn.classList.remove('arrow-disabled'); }
    }
  }
  function carouselPrev(id, total, e) { e.stopPropagation(); const t=document.getElementById(id); carouselGoTo(id, (parseInt(t?.getAttribute('data-idx'))||0)-1, total); }
  function carouselNext(id, total, e) { e.stopPropagation(); const t=document.getElementById(id); carouselGoTo(id, (parseInt(t?.getAttribute('data-idx'))||0)+1, total); }

      btn.onmouseout  = function() { this.style.background = 'none'; };

  function toggleReportMenu(e, reportId) {
    e.stopPropagation(); closeAllMenus();
    const VIOLATIONS = [
      'Konten pornografi',
      'Perilaku pengguna tidak pantas',
      'Informasi palsu / hoaks',
      'Spam berlebihan',
      'Konten berbahaya / kekerasan',
      'Penipuan / scam',
    ];
    const menu = document.createElement('div');
    menu.className = '_float-menu';
    menu.style.cssText = 'position:absolute;top:36px;right:0;background:#fff;border:1px solid #c1c8c9;border-radius:1rem;box-shadow:0 8px 32px rgba(0,0,0,0.12);padding:8px;z-index:200;min-width:215px;';
    const title = document.createElement('p');
    title.style.cssText = 'font-size:11px;color:#727879;padding:4px 12px 6px;font-weight:600;letter-spacing:0.05em;';
    title.textContent = 'LAPORKAN';
    menu.appendChild(title);
    VIOLATIONS.forEach(function(v, i) {
      const btn = document.createElement('button');
      btn.style.cssText = 'display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;border:none;background:none;cursor:pointer;border-radius:8px;font-size:13px;text-align:left;';
      btn.onmouseover = function() { this.style.background = '#f0ede9'; };
      btn.onmouseout  = function() { this.style.background = 'none'; };
      btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:15px;color:#ba1a1a;">flag</span>' + v;
      btn.onclick = function() { submitFlagReport(reportId, i, v, this); };
      menu.appendChild(btn);
    });
    e.currentTarget.closest('.relative').appendChild(menu);
  }

  function submitFlagReport(reportId, categoryId, categoryName, btn) {
    btn.closest('._float-menu').remove();
    api.post('/reports/' + reportId + '/flag', { category: categoryName })
      .then(() => showToast('Laporan terkirim. Terima kasih!'))
      .catch(() => showToast('Gagal mengirim laporan'));
  }

  function closeAllMenus() {
    document.querySelectorAll('._float-menu').forEach(m => m.remove());
  }
  document.addEventListener('click', closeAllMenus);

  function animBtn(el) {
    const span = el.querySelector('span') || el;
    span.style.transition = 'all 0.15s cubic-bezier(0.34,1.56,0.64,1)';
    span.style.color = '#1a373b';
    span.style.transform = 'scale(1.4)';
    setTimeout(() => {
      span.style.transform = 'scale(1)';
      setTimeout(() => { span.style.color = ''; }, 400);
    }, 150);
  }

  function animateBtn(el, color) {
    const span = el.querySelector('span') || el;
    const orig = span.style.color || '';
    span.style.color = color;
    span.style.transform = 'scale(1.35)';
    span.style.transition = 'all 0.15s cubic-bezier(0.34,1.56,0.64,1)';
    setTimeout(() => { span.style.transform = 'scale(1)'; setTimeout(() => { span.style.color = orig; }, 350); }, 150);
  }

  async function shareReport(reportId, title, location) {
    const url = window.location.origin + '/report-detail.html?id=' + reportId;
    if (navigator.share) {
      try { await navigator.share({ title, text: (location ? location + ' - ' : '') + 'Laporan di Winemu', url }); }
      catch(e) { if (e.name !== 'AbortError') showToast('Gagal berbagi'); }
    } else {
      await navigator.clipboard.writeText(url);
      showToast('Link disalin ke clipboard!');
    }
    api.post('/reports/' + reportId + '/share').catch(() => {});
  }

  async function toggleBookmark(reportId, btn) {
    const icon = btn.querySelector('.material-symbols-outlined');
    const isBookmarked = icon.textContent === 'bookmark';
    if (isBookmarked) {
      await api.delete(`/users/bookmarks/${reportId}`);
      icon.textContent = 'bookmark_border';
      btn.style.color = 'inherit';
      showToast('Bookmark dihapus');
    } else {
      await api.post(`/users/bookmarks/${reportId}`);
      icon.textContent = 'bookmark';
      btn.style.color = '#7d562d';
      showToast('Ditambahkan ke bookmark ✓');
    }
  }

  function openReport(id) {
    window.location.href = `/desktop/report-detail.html?id=${id}`;
  }

  function loadNearbyUsers() {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(
      async (position) => {
        const { latitude, longitude } = position.coords;
        const res = await api.get(`/users/nearby?lat=${latitude}&lng=${longitude}&radius=15&limit=10`);
        renderNearbyUsers(res?.data?.users || []);
      },
      () => { document.getElementById('nearby-users-section').classList.add('hidden'); },
      { timeout: 8000, maximumAge: 300000 }
    );
  }

  function renderNearbyUsers(users) {
    const section = document.getElementById('nearby-users-section');
    const list = document.getElementById('nearby-users-list');
    if (!users.length) { section.classList.add('hidden'); return; }

    list.innerHTML = users.map(u => {
      const avatar = u.avatar_url
        ? `<img src="${u.avatar_url}" class="w-16 h-16 rounded-full border-2 border-surface-container-lowest object-cover">`
        : `<div class="w-16 h-16 rounded-full bg-primary-container text-white flex items-center justify-center text-xl font-bold border-2 border-surface-container-lowest">${(u.full_name||u.username||'?')[0].toUpperCase()}</div>`;
      const firstName = (u.full_name || u.username || '').split(' ')[0];
      return `<div onclick="window.location.href='/desktop/user-profile.html?id=${u.id}'" class="flex flex-col items-center gap-2 cursor-pointer min-w-[72px]">
        <div class="w-16 h-16 rounded-full p-[2px] bg-gradient-to-tr from-primary-container to-secondary-container">${avatar}</div>
        <span class="text-label-caps font-label-caps text-on-surface-variant">${firstName}</span>
        <span class="text-[10px] text-on-surface-variant">${u.distance_km} km</span>
      </div>`;
    }).join('');
    section.classList.remove('hidden');
  }

  async function loadMiniProfile() {
    const res = await api.get('/users/profile');
    const u = res?.data?.user;
    if (!u) return;
    document.getElementById('mini-profile-name').textContent = u.full_name || u.username;
    document.getElementById('mini-profile-username').textContent = '@' + u.username;
    const av = document.getElementById('mini-profile-avatar');
    if (u.avatar_url) av.innerHTML = `<img src="${u.avatar_url}" class="w-full h-full rounded-full object-cover">`;
    else av.textContent = (u.full_name || u.username || '?')[0].toUpperCase();
  }

  async function loadCommunityStats() {
    const [activeRes, resolvedRes] = await Promise.all([
      api.get('/reports?per_page=1'),
      api.get('/reports?per_page=1&status=selesai'),
    ]);
    document.getElementById('stat-total-reports').textContent = activeRes?.data?.pagination?.total ?? '-';
    document.getElementById('stat-resolved').textContent = resolvedRes?.data?.pagination?.total ?? '-';
  }
</script>
