      </div>
      <div class="mt-8 text-center">
        <h2 class="font-display-lg text-display-lg text-primary mb-2">Temukan Kembali</h2>
        <p class="font-body-lg text-body-lg text-on-surface-variant max-w-md mx-auto">Masuki ekosistem pencarian komunitas yang dipercaya ribuan pengguna di seluruh Indonesia.</p>
      </div>
    </div>

    <div class="md:col-span-6 flex justify-center w-full">
      <div class="bg-surface-container-lowest p-8 md:p-12 rounded-[2rem] tonal-elevation w-full max-w-[480px] border border-surface-variant/30">
        <div class="mb-stack-md text-center md:text-left">
          <a href="/desktop/index.html" class="font-headline-md text-headline-md text-primary">Winemu</a>
          <h1 class="font-headline-md text-headline-md text-on-surface mb-2 mt-4">Selamat Datang Kembali</h1>
          <p class="font-body-sm text-body-sm text-on-surface-variant">
            Belum punya akun? <a class="text-primary font-bold hover:underline" href="/desktop/register.html">Daftar sekarang</a>
          </p>
        </div>

        <div class="space-y-6">
          <div class="space-y-2">
            <label class="block font-label-caps text-label-caps text-on-surface-variant ml-4" for="email">Alamat Email</label>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-outline">mail</span>
              <input id="email" name="email" placeholder="nama@email.com" type="email" class="w-full h-14 pl-14 pr-6 bg-surface rounded-full border border-outline-variant focus:border-primary input-focus-ring transition-all duration-200 font-body-md text-on-surface placeholder:text-outline/50">
            </div>
          </div>

          <div class="space-y-2">
            <div class="flex justify-between items-center px-4">
              <label class="font-label-caps text-label-caps text-on-surface-variant" for="password">Kata Sandi</label>
              <a class="font-label-caps text-label-caps text-primary hover:underline" href="/desktop/forgot-password.html">Lupa sandi?</a>
            </div>
            <div class="relative">
              <span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-outline">lock</span>
              <input id="password" name="password" placeholder="Masukkan kata sandi" type="password" class="w-full h-14 pl-14 pr-14 bg-surface rounded-full border border-outline-variant focus:border-primary input-focus-ring transition-all duration-200 font-body-md text-on-surface placeholder:text-outline/50">
              <button onclick="togglePass()" type="button" class="absolute right-5 top-1/2 -translate-y-1/2 text-outline hover:text-primary active-scale">
                <span class="material-symbols-outlined" id="pass-icon">visibility_off</span>
              </button>
            </div>
          </div>

          <p id="error-msg" class="text-red-600 text-sm hidden px-4"></p>

          <button id="submit-btn" onclick="handleLogin()" type="button" class="w-full h-14 bg-primary text-on-primary font-bold rounded-full shadow-lg active-scale transition-all duration-200 flex items-center justify-center gap-2 mt-2">
            <span>Masuk</span>
            <span class="material-symbols-outlined">arrow_forward</span>
          </button>
        </div>

        <div class="flex items-center gap-4 my-8">
          <div class="h-[1px] flex-1 bg-outline-variant/30"></div>
          <span class="font-label-caps text-label-caps text-outline uppercase tracking-widest">atau masuk dengan</span>
          <div class="h-[1px] flex-1 bg-outline-variant/30"></div>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <button onclick="showToast('Login dengan Google segera hadir')" type="button" class="flex items-center justify-center gap-3 h-14 border border-outline-variant rounded-full font-body-md text-on-surface hover:bg-surface-container-high transition-colors active-scale">

<script src="/js/api.js"></script>
<script>
  if (api.getToken()) {
    const existingUser = api.getUser();
    window.location.href = (existingUser && existingUser.role === 'admin') ? '/admin/dashboard.html' : '/desktop/feed.html';
  }

  function togglePass() {
    const inp = document.getElementById('password');
    const icon = document.getElementById('pass-icon');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    icon.textContent = inp.type === 'password' ? 'visibility_off' : 'visibility';
  }

  async function handleLogin() {
    const btn = document.getElementById('submit-btn');
    const errEl = document.getElementById('error-msg');
    errEl.classList.add('hidden');

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    if (!email || !password) { errEl.textContent = 'Email dan password wajib diisi'; errEl.classList.remove('hidden'); return; }

    btn.innerHTML = '<span class="animate-spin material-symbols-outlined">refresh</span>';
    btn.disabled = true;

    const result = await api.post('/auth/login', { email, password });

    if (result && result.status === 'success') {
      api.setTokens(result.data.access_token, result.data.refresh_token);
      api.setUser(result.data.user);
      showToast('Berhasil masuk! Selamat datang kembali 👋');
      const destination = result.data.user && result.data.user.role === 'admin' ? '/admin/dashboard.html' : '/desktop/feed.html';
      setTimeout(() => window.location.href = destination, 800);
    } else {
      errEl.textContent = result?.message || 'Email atau password salah';
      errEl.classList.remove('hidden');
      btn.innerHTML = '<span>Masuk</span><span class="material-symbols-outlined">arrow_forward</span>';
      btn.disabled = false;
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
