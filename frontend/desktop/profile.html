<body class="font-body-md text-body-md bg-surface flex">
<div id="desktop-sidebar"></div>

<div class="flex-1 ml-64 flex min-h-screen">
  <main class="flex-grow w-full max-w-[860px] px-8 py-8 mx-auto">
    <section class="flex flex-col md:flex-row items-start gap-6 mb-8 bg-surface-container-lowest ambient-shadow rounded-2xl p-6">
      <div class="flex-shrink-0 relative">
        <div id="avatar-container" class="w-40 h-40 rounded-full object-cover border-4 border-surface-bright shadow-sm bg-primary-container text-white flex items-center justify-center text-5xl font-bold cursor-pointer overflow-hidden" onclick="document.getElementById('avatar-upload').click()">
          <span id="avatar-initials">?</span>
        </div>
        <input type="file" id="avatar-upload" accept="image/*" class="hidden" onchange="uploadAvatar(event)">
        <div class="absolute bottom-2 right-2 bg-primary-container text-white w-10 h-10 rounded-full flex items-center justify-center border-4 border-surface-container-lowest pointer-events-none">
          <span class="material-symbols-outlined text-[18px]">photo_camera</span>
        </div>
      </div>

      <div class="flex-grow text-center md:text-left flex flex-col justify-center pt-2">
        <div class="flex items-start justify-between gap-2 mb-3">
          <h1 class="font-headline-md text-2xl text-on-surface min-w-0 break-words leading-tight" id="user-fullname">Loading...</h1>
          <div class="flex-shrink-0 flex gap-2 items-center">
            <button onclick="openEdit()" class="bg-primary-container text-on-primary px-4 py-2 rounded-full font-body-md text-sm hover:opacity-90 transition-opacity flex items-center gap-1.5">
              <span class="material-symbols-outlined text-xl">edit</span>Ubah Profil
            </button>
            <button onclick="shareProfile()" class="border border-outline-variant text-primary w-9 h-9 hover:bg-surface-container-low transition-colors flex items-center justify-center rounded-full flex-shrink-0">
              <span class="material-symbols-outlined text-xl">share</span>
            </button>
          </div>
        </div>
        <p class="font-body-md text-body-md text-on-surface-variant mb-2 max-w-2xl leading-relaxed" id="user-bio"></p>
        <div id="verified-badge" class="hidden inline-flex items-center gap-1.5 bg-primary-fixed-dim text-on-primary-fixed-variant rounded-full px-3 py-1 w-fit mb-4">
          <span class="material-symbols-outlined text-[16px] filled">verified</span>
          <span class="text-xs font-semibold">Terverifikasi</span>
        </div>
        <div class="flex justify-center md:justify-start gap-10 border-t border-surface-variant pt-6">
          <div class="text-center md:text-left">
            <div class="font-headline-md text-2xl text-primary mb-1" id="stat-reports">0</div>
            <div class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Laporan</div>
          </div>
          <div class="text-center md:text-left">
            <div class="font-headline-md text-2xl text-primary mb-1" id="stat-found">0</div>
            <div class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Ditemukan</div>
          </div>
          <div class="text-center md:text-left">
            <div class="font-headline-md text-2xl text-secondary flex items-center justify-center md:justify-start gap-1 mb-1" id="stat-rating">- <span class="material-symbols-outlined text-lg filled">star</span></div>
            <div class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-wider">Rating</div>
          </div>
        </div>
      </div>
    </section>

    <div class="flex gap-8 border-b border-surface-variant mb-8">
      <button onclick="setTab('grid')" id="tab-grid" class="text-primary font-bold border-b-2 border-primary pb-3 px-2 font-body-lg text-lg tracking-wide">LAPORAN SAYA</button>
      <button onclick="setTab('bookmarks')" id="tab-bookmarks" class="text-on-surface-variant font-normal hover:text-primary pb-3 px-2 font-body-lg text-lg tracking-wide transition-colors border-b-2 border-transparent">DISIMPAN</button>
    </div>

    <div id="reports-grid" class="grid grid-cols-3 gap-4"></div>
    <div id="bookmarks-grid" class="hidden grid grid-cols-3 gap-4"></div>
  </main>

  <aside class="w-80 hidden lg:block p-8 border-l border-surface-variant">
    <div class="bg-surface-container-lowest rounded-md p-6 ambient-shadow mb-6">
      <h3 class="font-headline-md text-xl text-on-surface mb-4">Ringkasan Akun</h3>
      <div class="space-y-3 text-sm">
        <div class="flex justify-between items-start gap-2">
          <span class="text-on-surface-variant flex-shrink-0">Email</span>
          <span class="font-semibold text-right min-w-0 truncate" id="summary-email" title="">-</span>
        </div>
        <div class="flex justify-between items-center gap-2">
          <span class="text-on-surface-variant flex-shrink-0">Lokasi</span>
          <span class="font-semibold text-right min-w-0 truncate" id="summary-location">-</span>
        </div>
        <div class="flex justify-between items-center gap-2">
          <span class="text-on-surface-variant flex-shrink-0">Bergabung</span>
          <span class="font-semibold text-right" id="summary-joined">-</span>
        </div>
      </div>
      <a href="/desktop/settings.html" class="mt-4 w-full block text-center py-2.5 border border-outline-variant rounded-lg text-primary text-sm font-semibold hover:bg-surface-container-low transition-colors">Pengaturan Lengkap</a>
    </div>
    <footer class="text-on-surface-variant font-body-sm text-sm">
      <div>© 2026 Winemu Dari Nusantara.</div>
    </footer>
  </aside>
</div>

<!-- Edit Modal -->
<div id="edit-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4">
  <div class="w-full max-w-md bg-surface-container-lowest rounded-2xl p-6 shadow-2xl">
    <div class="flex justify-between items-center mb-4">
      <h3 class="font-headline-md text-lg text-primary">Ubah Profil</h3>
      <button onclick="closeEdit()" class="text-on-surface-variant"><span class="material-symbols-outlined">close</span></button>
    </div>
    <div class="flex flex-col gap-4">
      <input id="edit-fullname" type="text" placeholder="Nama Lengkap" class="w-full px-4 py-3 border border-outline-variant rounded-xl focus:outline-none focus:border-primary text-on-surface">
      <textarea id="edit-bio" placeholder="Bio" rows="3" class="w-full px-4 py-3 border border-outline-variant rounded-xl focus:outline-none focus:border-primary text-on-surface resize-none"></textarea>
      <input id="edit-location" type="text" placeholder="Lokasi" class="w-full px-4 py-3 border border-outline-variant rounded-xl focus:outline-none focus:border-primary text-on-surface">
      <input id="edit-phone" type="tel" placeholder="Nomor Telepon" class="w-full px-4 py-3 border border-outline-variant rounded-xl focus:outline-none focus:border-primary text-on-surface">
    </div>
    <div class="flex gap-3 mt-5">
      <button onclick="closeEdit()" class="flex-1 py-2.5 border border-outline-variant rounded-lg text-sm text-on-surface-variant hover:bg-surface-variant">Batal</button>
      <button onclick="saveProfile()" class="flex-1 py-2.5 bg-primary text-on-primary rounded-lg text-sm font-bold hover:bg-primary-container">Simpan</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/desktop/js/desktop-nav.js"></script>
<script>
  let userData = null;

  window.addEventListener('DOMContentLoaded', () => {
    injectDesktopNav('profile');
    if (!isLoggedIn()) { window.location.href = '/desktop/login.html'; return; }
    loadProfile();
    loadReports();
  });

  async function loadProfile() {
    const res = await api.get('/users/profile');
    if (!res?.data?.user) return;
    userData = res.data.user;
    api.setUser(userData);

    document.getElementById('user-fullname').textContent = userData.full_name || userData.username;
    document.getElementById('user-bio').textContent = userData.bio || '';
    document.getElementById('stat-reports').textContent = userData.total_reports || 0;
    document.getElementById('stat-found').textContent = userData.total_found || 0;
    document.getElementById('stat-rating').innerHTML = `${(userData.rating||0).toFixed(1)} <span class="material-symbols-outlined text-lg filled">star</span>`;
    const emailEl = document.getElementById('summary-email');
    emailEl.textContent = userData.email || '-';
    emailEl.title = userData.email || '';
    document.getElementById('summary-location').textContent = userData.location || '-';
    document.getElementById('summary-joined').textContent = userData.created_at ? new Date(userData.created_at).toLocaleDateString('id-ID', {month:'short', year:'numeric'}) : '-';

    if (userData.is_verified) document.getElementById('verified-badge').classList.remove('hidden');

    const container = document.getElementById('avatar-container');
    if (userData.avatar_url) {
      container.innerHTML = `<img src="${userData.avatar_url}" class="w-full h-full object-cover">`;
    } else {
      document.getElementById('avatar-initials').textContent = (userData.full_name || userData.username || '?')[0].toUpperCase();
    }
  }

  async function loadReports() {
    const user = api.getUser();
    if (!user) return;
    const res = await api.get(`/users/${user.id}/reports?per_page=18`);
    if (!res?.data?.items) return;
    renderGrid('reports-grid', res.data.items);
  }

  async function loadBookmarks() {
    const res = await api.get('/users/bookmarks?per_page=18');
    if (!res?.data?.items) return;
    renderGrid('bookmarks-grid', res.data.items.map(b => b.report).filter(Boolean));
  }

  function renderGrid(containerId, items) {
    const grid = document.getElementById(containerId);
    if (items.length === 0) {
      grid.innerHTML = '<div class="col-span-3 text-center py-12 text-on-surface-variant"><span class="material-symbols-outlined text-5xl block mb-3">inventory_2</span><p>Belum ada laporan</p></div>';
      return;
    }
    grid.innerHTML = items.map(r => {
      if (!r) return '';
      const badgeColor = r.type === 'hilang' ? '#ba1a1a' : '#7d562d';
      const badgeText = r.type === 'hilang' ? 'HILANG' : 'DITEMUKAN';
      const overlayClass = r.type === 'hilang' ? 'overlay-hilang' : 'overlay-ditemukan';
      const img = r.primary_image
        ? `<img src="${r.primary_image}" class="w-full h-full object-cover">`
        : r.primary_video
          ? `<video src="${r.primary_video}" class="w-full h-full object-cover" muted playsinline preload="metadata"></video>
             <div class="absolute inset-0 flex items-center justify-center pointer-events-none"><span class="material-symbols-outlined text-white drop-shadow-lg" style="font-size:32px;">play_circle</span></div>`
          : `<div class="w-full h-full bg-surface-container flex items-center justify-center"><span class="material-symbols-outlined text-3xl text-outline">image_not_supported</span></div>`;
      return `<div onclick="window.location.href='/desktop/report-detail.html?id=${r.id}'" class="aspect-square relative group cursor-pointer overflow-hidden bg-surface-container rounded-md hover:-translate-y-1 transition-transform duration-300">
        ${img}
        <div class="absolute inset-0 ${overlayClass} pointer-events-none"></div>
        <div class="absolute bottom-2 left-2 text-white px-1.5 py-0.5 text-[10px] font-bold rounded tracking-wider" style="background:${badgeColor};">${badgeText}</div>
        ${r.status === 'selesai' ? `<div class="absolute inset-0 bg-black/50 flex items-center justify-center"><span class="text-white text-xs font-bold border border-white px-2 py-1 rounded-full tracking-wider">✓ SELESAI</span></div>` : ''}
      </div>`;
    }).join('');
  }

  function setTab(tab) {
    const isGrid = tab === 'grid';
    document.getElementById('reports-grid').classList.toggle('hidden', !isGrid);
    document.getElementById('bookmarks-grid').classList.toggle('hidden', isGrid);
    document.getElementById('tab-grid').className = `text-${isGrid?'primary font-bold border-primary':'on-surface-variant font-normal hover:text-primary border-transparent'} pb-3 px-2 font-body-lg text-lg tracking-wide transition-colors border-b-2`;
    document.getElementById('tab-bookmarks').className = `text-${!isGrid?'primary font-bold border-primary':'on-surface-variant font-normal hover:text-primary border-transparent'} pb-3 px-2 font-body-lg text-lg tracking-wide transition-colors border-b-2`;
    if (!isGrid) loadBookmarks();
  }

  function openEdit() {
    if (!userData) return;
    document.getElementById('edit-fullname').value = userData.full_name || '';
    document.getElementById('edit-bio').value = userData.bio || '';
    document.getElementById('edit-location').value = userData.location || '';
    document.getElementById('edit-phone').value = userData.phone || '';
    document.getElementById('edit-modal').classList.remove('hidden');
  }
  function closeEdit() { document.getElementById('edit-modal').classList.add('hidden'); }

  async function saveProfile() {
    const res = await api.put('/users/profile', {
      full_name: document.getElementById('edit-fullname').value,
      bio: document.getElementById('edit-bio').value,
      location: document.getElementById('edit-location').value,
      phone: document.getElementById('edit-phone').value,
    });
    if (res?.status === 'success') { closeEdit(); loadProfile(); showToast('Profil berhasil diperbarui'); }
  }

  async function uploadAvatar(e) {
    const file = e.target.files[0];
    if (!file) return;
    const fd = new FormData();
    fd.append('avatar', file);
    const res = await api.postForm('/users/profile/avatar', fd);
    if (res?.status === 'success') { showToast('Avatar diperbarui'); loadProfile(); }
    else showToast('Gagal mengupload avatar', true);
  }

  function shareProfile() {
    const user = api.getUser();
    navigator.clipboard?.writeText(window.location.origin + '/desktop/user-profile.html?id=' + user?.id)
      .then(() => showToast('Link profil disalin'));
  }
</script>
</body>
</html>
