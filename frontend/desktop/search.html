<body class="bg-surface text-on-surface font-body-md h-screen flex overflow-hidden">
<div id="desktop-sidebar"></div>

<main class="flex-grow flex w-full ml-64 overflow-hidden">
  <aside class="w-full md:w-2/5 lg:w-[420px] flex flex-col h-full bg-surface z-10 border-r border-surface-variant/50">
    <div class="px-stack-md py-stack-md flex-grow overflow-y-auto space-y-stack-md">
      <div class="space-y-stack-sm">
        <h2 class="font-headline-md text-headline-md text-primary tracking-tight">Temukan Sesuatu</h2>
        <div class="relative group">
          <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline group-focus-within:text-primary transition-colors">search</span>
          <input id="search-input" oninput="debounceSearch()" class="w-full pl-12 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-full text-body-md text-on-surface placeholder:text-outline focus:outline-none focus:ring-2 focus:ring-primary-container/30 focus:border-primary-container transition-all custom-shadow" placeholder="Cari barang hilang, lokasi..." type="text">
        </div>
      </div>

      <div class="space-y-stack-sm">
        <h3 class="font-body-md font-semibold text-primary">Kategori Populer</h3>
        <div id="categories-list" class="flex flex-wrap gap-2"></div>
      </div>

      <div id="recent-section" class="hidden space-y-stack-sm pt-4 border-t border-surface-variant/50">
        <div class="flex justify-between items-center">
          <h3 class="font-body-md font-semibold text-primary">Pencarian Terkini</h3>
          <button onclick="clearRecent()" class="text-xs text-outline hover:text-error">Hapus</button>
        </div>
        <ul id="recent-list" class="space-y-1"></ul>
      </div>

      <div id="results-section" class="hidden space-y-stack-sm pt-4 border-t border-surface-variant/50">
        <div class="flex justify-between items-center">
          <h3 class="font-body-md font-semibold text-primary">Hasil Pencarian</h3>
          <span id="result-count" class="text-xs text-on-surface-variant"></span>
        </div>
        <div id="result-loading" class="hidden flex justify-center py-6"><div class="w-6 h-6 border-3 border-primary border-t-transparent rounded-full animate-spin"></div></div>
        <div id="results-list" class="grid grid-cols-2 gap-3"></div>
      </div>
    </div>
  </aside>

  <div class="hidden md:block flex-grow relative h-full bg-surface-container-low p-stack-sm">
    <div class="w-full h-full rounded-2xl overflow-hidden relative custom-shadow bg-surface-container-lowest">
      <div id="map-view"></div>
    </div>
  </div>
</main>

<script src="/js/api.js"></script>
<script src="/desktop/js/desktop-nav.js"></script>
<script>
  if (!isLoggedIn()) window.location.href = '/desktop/login.html';

  const RECENT_KEY = 'winemu_recent_searches';
  let searchTimeout = null;
  let mapInstance = null;

  window.addEventListener('DOMContentLoaded', () => {
    injectDesktopNav('search');
    loadCategories();
    loadRecent();
    initMap();
  });

  function initMap() {
    mapInstance = L.map('map-view').setView([-7.797068, 110.370529], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'© OpenStreetMap'}).addTo(mapInstance);
    loadMapMarkers();
  }

  async function loadMapMarkers() {
    if (!mapInstance) return;
    const res = await api.get('/reports?per_page=50');
    if (!res?.data?.items) return;
    res.data.items.forEach(r => {
      if (r.latitude && r.longitude) {
        const color = r.type === 'hilang' ? '#C06C50' : '#D4A373';
        const icon = L.divIcon({ html: `<div style="width:32px;height:32px;background:${color};border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.3);"></div>`, className: '', iconSize: [32, 32], iconAnchor: [16, 32] });
        L.marker([r.latitude, r.longitude], {icon}).addTo(mapInstance)
          .bindPopup(`<b>${r.title}</b><br><small>${r.type==='hilang'?'HILANG':'DITEMUKAN'}</small><br><a href="/desktop/report-detail.html?id=${r.id}" style="color:#314e52;font-weight:bold;">Lihat Detail →</a>`);
      }
    });
  }

  async function loadCategories() {
    const res = await api.get('/categories');
    if (!res?.data?.categories) return;
    document.getElementById('categories-list').innerHTML = res.data.categories.map(c =>
      `<button onclick="searchByCategory('${c.id}','${c.name}')" class="flex items-center gap-2 px-4 py-2 bg-primary-fixed/20 text-primary-container rounded-full hover:bg-primary-fixed/40 transition-colors custom-shadow">
        <span class="material-symbols-outlined text-[18px]">${c.icon||'category'}</span>
        <span class="font-body-sm text-sm font-semibold">${c.name}</span>
      </button>`
    ).join('');
  }

  function loadRecent() {
    const recent = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
    const list = document.getElementById('recent-list');
    if (recent.length === 0) { document.getElementById('recent-section').classList.add('hidden'); return; }
    document.getElementById('recent-section').classList.remove('hidden');
    list.innerHTML = recent.map(q =>
      `<li class="flex items-center justify-between p-3 bg-surface-container-lowest rounded-xl custom-shadow hover:bg-surface-container-low transition-colors group cursor-pointer" onclick="doSearch('${q}')">
        <div class="flex items-center gap-3 text-on-surface">
          <span class="material-symbols-outlined text-outline">history</span>
          <span class="font-body-md">${q}</span>
        </div>
        <button onclick="event.stopPropagation();removeRecent('${q}')" class="text-outline-variant hover:text-red-500 transition-colors opacity-0 group-hover:opacity-100 p-1">
          <span class="material-symbols-outlined text-[20px]">close</span>
        </button>
      </li>`
    ).join('');
  }

  function addRecent(q) {
    let recent = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
    recent = [q, ...recent.filter(r => r !== q)].slice(0, 5);
    localStorage.setItem(RECENT_KEY, JSON.stringify(recent));
  }
  function removeRecent(q) {
    let recent = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]').filter(r => r !== q);
    localStorage.setItem(RECENT_KEY, JSON.stringify(recent));
    loadRecent();
  }
  function clearRecent() { localStorage.removeItem(RECENT_KEY); loadRecent(); }

  function debounceSearch() {
    clearTimeout(searchTimeout);
    searchTimeout = setTimeout(() => {
      const q = document.getElementById('search-input').value.trim();
      if (q.length > 1) doSearch(q);
      else showEmptyState();
    }, 400);
  }

  function showEmptyState() {
    document.getElementById('results-section').classList.add('hidden');
    loadRecent();
  }

  async function doSearch(q) {
    document.getElementById('search-input').value = q;
    addRecent(q);
    document.getElementById('results-section').classList.remove('hidden');
    document.getElementById('result-loading').classList.remove('hidden');

    const res = await api.get(`/reports?q=${encodeURIComponent(q)}&per_page=20`);
    document.getElementById('result-loading').classList.add('hidden');

    if (!res?.data) return;
    const { items, pagination } = res.data;
    document.getElementById('result-count').textContent = `${pagination.total} hasil`;
    renderResults(items);
  }

  async function searchByCategory(catId, catName) {
    document.getElementById('search-input').value = catName;
    document.getElementById('results-section').classList.remove('hidden');
    document.getElementById('result-loading').classList.remove('hidden');

    const res = await api.get(`/reports?category_id=${catId}&per_page=20`);
    document.getElementById('result-loading').classList.add('hidden');

    if (!res?.data) return;
    const { items, pagination } = res.data;
    document.getElementById('result-count').textContent = `${pagination.total} hasil`;
    renderResults(items);
  }

  function renderResults(items) {
    const list = document.getElementById('results-list');
    if (items.length === 0) {
      list.innerHTML = '<div class="col-span-2 text-center py-12 text-on-surface-variant"><span class="material-symbols-outlined text-5xl block mb-3">search_off</span><p>Tidak ada hasil ditemukan</p></div>';
      return;
    }
    list.innerHTML = items.map(r => {
      const img = r.primary_image
        ? `<img src="${r.primary_image}" class="w-full h-full object-cover">`
        : r.primary_video
          ? `<video src="${r.primary_video}" class="w-full h-full object-cover" muted playsinline preload="metadata"></video>
             <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
               <span class="material-symbols-outlined text-white drop-shadow-lg" style="font-size:36px;">play_circle</span>
             </div>`
          : `<div class="w-full h-full bg-surface-container flex items-center justify-center"><span class="material-symbols-outlined text-4xl text-outline">image_not_supported</span></div>`;
      const badgeColor = r.type === 'hilang' ? '#C06C50' : '#D4A373';
      const badgeText = r.type === 'hilang' ? 'HILANG' : 'DITEMUKAN';
      return `<div onclick="window.location.href='/desktop/report-detail.html?id=${r.id}'" class="bg-surface-container-lowest rounded-xl shadow-sm overflow-hidden cursor-pointer hover:shadow-md transition-shadow">
        <div class="relative aspect-square">${img}
          <div class="absolute top-2 left-2 text-white px-2 py-0.5 rounded-full text-[10px] font-bold" style="background:${badgeColor};">${badgeText}</div>
        </div>
        <div class="p-2">
          <p class="text-sm font-semibold text-on-surface truncate">${r.title}</p>
          <p class="text-xs text-on-surface-variant truncate">${r.location_name || '-'}</p>
        </div>
      </div>`;
    }).join('');
  }
</script>
</body>
