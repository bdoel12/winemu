<body class="antialiased min-h-screen flex flex-col font-body-md text-body-md pb-24 md:pb-0">
  <div id="sticky-header-group" class="sticky top-0 z-50">
    <div id="top-bar"></div>
    <!-- Filter bar -->
    <div class="bg-[#F8F5F0] border-b border-surface-container-highest px-4 py-2">
      <div class="flex gap-2 max-w-[600px] mx-auto overflow-x-auto no-scrollbar">
        <button onclick="setFilter('all')" id="filter-all" class="flex-shrink-0 px-4 py-1.5 rounded-full bg-primary-container text-white font-label-caps text-label-caps whitespace-nowrap transition-all">Semua</button>
        <button onclick="setFilter('hilang')" id="filter-hilang" class="flex-shrink-0 px-4 py-1.5 rounded-full bg-surface-container-high text-on-surface-variant font-label-caps text-label-caps whitespace-nowrap transition-all">Hilang</button>
        <button onclick="setFilter('ditemukan')" id="filter-ditemukan" class="flex-shrink-0 px-4 py-1.5 rounded-full bg-surface-container-high text-on-surface-variant font-label-caps text-label-caps whitespace-nowrap transition-all">Ditemukan</button>
      </div>
    </div>
  </div>

  <div id="nearby-users-section" class="hidden w-full max-w-[600px] mx-auto px-4 pt-4">
    <h3 class="font-label-caps text-label-caps text-on-surface-variant mb-3 px-1">User di Sekitar Anda</h3>
    <div id="nearby-users-list" class="flex gap-4 overflow-x-auto no-scrollbar pb-2"></div>
  </div>

  <main class="flex-grow w-full max-w-[600px] mx-auto py-4 flex flex-col gap-6" id="feed-container">
    <!-- Cards injected here -->
  </main>

  <div id="load-more-trigger" class="flex justify-center py-4">
    <div id="loading-dots" class="flex gap-2 items-center">
      <div class="w-2.5 h-2.5 bg-[#314E52] rounded-full animate-bounce" style="animation-delay:0s"></div>
      <div class="w-2.5 h-2.5 bg-[#314E52] rounded-full animate-bounce" style="animation-delay:0.1s"></div>
      <div class="w-2.5 h-2.5 bg-[#314E52] rounded-full animate-bounce" style="animation-delay:0.2s"></div>

<script src="/js/api.js"></script>
<script src="/js/nav.js"></script>
<script src="/js/permissions.js"></script>
<script>
  let page = 1, loading = false, hasMore = true, currentFilter = 'all';

  window.addEventListener('DOMContentLoaded', () => {
    injectNav('home');
    loadFeed();
    setupInfiniteScroll();
    loadNearbyUsers();
  });

  function setFilter(type) {
    currentFilter = type;
    page = 1; hasMore = true;
    document.getElementById('feed-container').innerHTML = '';
    ['all','hilang','ditemukan'].forEach(f => {
      const btn = document.getElementById('filter-' + f);
      if (f === type) {
        btn.className = 'flex-shrink-0 px-4 py-1.5 rounded-full bg-primary-container text-white font-label-caps text-label-caps whitespace-nowrap transition-all';
      } else {
        btn.className = 'flex-shrink-0 px-4 py-1.5 rounded-full bg-surface-container-high text-on-surface-variant font-label-caps text-label-caps whitespace-nowrap transition-all';
      }
    });
    loadFeed();
  }

  async function loadFeed() {
    if (loading || !hasMore) return;
    loading = true;
    document.getElementById('loading-dots').style.display = 'flex';

    let url = `/reports?page=${page}&per_page=5`;
    if (currentFilter !== 'all') url += `&type=${currentFilter}`;

    const res = await api.get(url);
    loading = false;

    if (res && res.status === 'success') {
      const { items, pagination } = res.data;
      hasMore = pagination.has_next;
      if (!hasMore) document.getElementById('loading-dots').style.display = 'none';
      renderCards(items);
      page++;
    } else {
      document.getElementById('loading-dots').style.display = 'none';
    }
  }

  function renderCards(items) {
    const container = document.getElementById('feed-container');
    items.forEach(r => {
      const card = document.createElement('article');
      card.className = 'bg-surface-container-lowest md:rounded-xl shadow-sm overflow-hidden flex flex-col pb-4';
      const badgeColor = r.type === 'hilang' ? '#C06C50' : '#D4A373';
      const badgeText = r.type === 'hilang' ? 'HILANG' : 'DITEMUKAN';
      const timeStr = timeAgo(r.created_at);
      const avatar = r.author?.avatar_url
        ? `<img src="${r.author.avatar_url}" alt="${r.author.full_name}" class="w-10 h-10 rounded-full object-cover border border-surface-container-high">`
        : `<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-white font-bold">${(r.author?.full_name || r.author?.username || '?')[0].toUpperCase()}</div>`;

      const mediaItems = (r.media && r.media.length > 0) ? r.media : (
        r.primary_image ? [{ type: 'image', url: r.primary_image }] :
        r.primary_video ? [{ type: 'video', url: r.primary_video }] : []
      );
      const carouselId = `carousel-${r.id}`;
      const hasDots = mediaItems.length > 1;
      const slides = mediaItems.map(m =>
        m.type === 'image'
          ? `<img src="${m.url}" alt="${r.title}" class="feed-slide w-full h-full object-cover flex-shrink-0" style="min-width:100%;pointer-events:none;" draggable="false">`
          : `<video src="${m.url}" class="feed-slide w-full h-full object-cover flex-shrink-0" style="min-width:100%;pointer-events:none;" draggable="false" muted playsinline autoplay loop preload="auto" id="vid-${r.id}-${m.url.slice(-8)}" onclick="toggleVideoSound(this)"></video>`
      ).join('');
      const dots = hasDots
        ? `<div class="absolute bottom-2 left-0 right-0 flex justify-center gap-1.5 pointer-events-none">
            ${mediaItems.map((_, i) => `<span class="carousel-dot rounded-full transition-all duration-300 ${i===0?'bg-white w-3 h-1.5':'bg-white/50 w-1.5 h-1.5'}"></span>`).join('')}
           </div>` : '';
      const arrowBtns = mediaItems.length > 1 ? `
        <button class="carousel-arrow prev" onclick="carouselPrev('${carouselId}',${mediaItems.length},event)">&#8249;</button>
        <button class="carousel-arrow next" onclick="carouselNext('${carouselId}',${mediaItems.length},event)">&#8250;</button>` : '';
      const mediaHtml = mediaItems.length > 0
        ? `<div class="relative overflow-hidden carousel-wrap w-full h-full">
            <div id="${carouselId}" class="flex h-full transition-transform duration-300 ease-in-out" data-idx="0" style="will-change:transform;">${slides}</div>
            ${dots}
            ${arrowBtns}
           </div>`
        : `<div class="w-full h-full flex items-center justify-center bg-surface-container"><span class="material-symbols-outlined text-6xl text-outline">image_not_supported</span></div>`;

      card.innerHTML = `
        <div class="flex justify-between items-center px-4 py-3 border-b border-surface-container-highest">
          <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href='/user-profile.html?id=${r.user_id}'">
            ${avatar}
            <div>
              <p class="font-body-md text-[14px] font-bold text-on-surface leading-tight">${r.author?.full_name || r.author?.username || 'Pengguna'}</p>
              <p class="font-body-sm text-[12px] text-on-surface-variant leading-tight">${r.location_name || 'Lokasi tidak diketahui'}</p>
            </div>
          </div>
          <div class="relative">
            <button onclick="toggleReportMenu(event, ${r.id})" class="text-on-surface-variant p-1"><span class="material-symbols-outlined">more_vert</span></button>
          </div>
        </div>
        <div class="relative w-full" style="aspect-ratio:4/5;background:#f0ede9;">
          ${mediaHtml}
          <div class="absolute top-4 left-4 text-white px-3 py-1 rounded-sm font-label-caps text-[10px] font-bold shadow-md tracking-wider" style="background:${badgeColor};">${badgeText}</div>
        </div>
        <div class="flex flex-col px-4 pt-3 gap-2">
          <div class="flex justify-between items-center mb-1">
            <div class="flex gap-4">
              <button class="like-btn text-[#314E52] hover:text-red-500 transition-colors flex items-center gap-1" onclick="toggleLike(${r.id}, this)" data-liked="${r.is_liked}">
                <span class="material-symbols-outlined" style="font-variation-settings:'FILL' ${r.is_liked ? '1' : '0'};">favorite${r.is_liked ? '' : '_border'}</span>
                <span class="text-xs">${r.like_count || 0}</span>
              </button>
              <button class="text-[#314E52] hover:text-primary transition-colors flex items-center gap-1" onclick="animBtn(this); openReport(${r.id})">
                <span class="material-symbols-outlined">chat_bubble</span>
                <span class="text-xs">${r.comment_count || 0}</span>
              </button>
              <button class="text-[#314E52] hover:text-primary transition-colors" data-rid="${r.id}" data-title="${(r.title||'').replace(/"/g,'&quot;')}" data-loc="${r.location_name||''}" onclick="animBtn(this); shareFromBtn(this)">
                <span class="material-symbols-outlined">send</span>
              </button>
            </div>
            <div class="flex items-center gap-3">
              <p class="font-body-sm text-[12px] text-on-surface-variant">${timeStr}</p>
              <button class="bookmark-btn transition-colors" style="color:${r.is_bookmarked?'#1a373b':'#314E52'}" onclick="toggleBookmark(${r.id}, this)">
                <span class="material-symbols-outlined text-[18px]">${r.is_bookmarked?'bookmark':'bookmark_border'}</span>
              </button>
            </div>
          </div>
          <div class="font-body-sm text-[14px] text-on-surface leading-snug">
            <span class="font-bold mr-1">${r.title}</span>
            ${r.description ? `${r.description.substring(0,80)}${r.description.length>80?'...':''} <span class="text-on-surface-variant cursor-pointer" onclick="openReport(${r.id})">selengkapnya</span>` : ''}
          </div>
          <button onclick="openReport(${r.id})" class="w-full mt-2 py-2.5 rounded-lg font-label-caps text-[13px] font-bold transition-colors ${r.type === 'hilang' ? 'bg-primary text-on-primary hover:bg-primary/90' : 'border-2 border-secondary text-secondary hover:bg-secondary/5'}">
            ${r.type === 'hilang' ? 'Bantu Cari' : 'Klaim Barang Ini'}
          </button>
        </div>`;
      container.appendChild(card);
    });
  }


  // ── Carousel (rewrite) ────────────────────────────────────────────────────
  // Menggantikan initCarousels() sebelumnya dengan versi yang lebih robust
  function initCarousels() {
    document.querySelectorAll('[id^="carousel-"]').forEach(track => {
      if (track.dataset.init) return;
      track.dataset.init = '1';
      const wrap = track.parentElement; // .relative.overflow-hidden
      const total = track.children.length;
      if (total <= 1) return;

      let startX = 0, curX = 0, dragging = false;

      function getIdx() { return parseInt(track.getAttribute('data-idx')) || 0; }

      function goTo(idx) {
        idx = Math.max(0, Math.min(total - 1, idx));
        track.setAttribute('data-idx', idx);
        track.style.transition = 'transform 0.3s ease';
        track.style.transform = 'translateX(-' + (idx * 100) + '%)';
        wrap.querySelectorAll('.carousel-dot').forEach(function(d, i) {
          d.style.width = i === idx ? '14px' : '6px';
          d.style.opacity = i === idx ? '1' : '0.55';
        });
      }

      function onStart(x) { startX = x; curX = x; dragging = true; track.style.transition = 'none'; }
      function onMove(x) {
        if (!dragging) return;
        curX = x;
        var diff = x - startX;
        track.style.transform = 'translateX(calc(-' + (getIdx() * 100) + '% + ' + diff + 'px))';
      }
      function onEnd(x) {
        if (!dragging) return;
        dragging = false;
        var diff = x - startX;
        if (Math.abs(diff) > 35) goTo(getIdx() + (diff < 0 ? 1 : -1));
        else goTo(getIdx());
      }

      // Mouse
      wrap.addEventListener('mousedown', function(e) { onStart(e.clientX); e.preventDefault(); });
      window.addEventListener('mousemove', function(e) { if (dragging) onMove(e.clientX); });
      window.addEventListener('mouseup', function(e) { if (dragging) onEnd(e.clientX); });

      // Touch
      wrap.addEventListener('touchstart', function(e) { onStart(e.touches[0].clientX); }, { passive: true });
      wrap.addEventListener('touchmove', function(e) { onMove(e.touches[0].clientX); }, { passive: true });
      wrap.addEventListener('touchend', function(e) { onEnd(e.changedTouches[0].clientX); }, { passive: true });

      // Disable img/video native drag
      track.querySelectorAll('img,video').forEach(function(el) {
        el.setAttribute('draggable', 'false');
        el.style.pointerEvents = 'none';
        el.style.userSelect = 'none';
      });
      // Initial state: hide prev (at index 0)
      setTimeout(function() {
        var prevBtn = wrap.querySelector('.carousel-arrow.prev');
        if (prevBtn) prevBtn.style.display = 'none';
        if (total <= 1) {
          var nextBtn = wrap.querySelector('.carousel-arrow.next');
          if (nextBtn) nextBtn.style.display = 'none';
        }
      }, 60);
    });
  }



  function setupInfiniteScroll() {
    const observer = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) loadFeed();
    }, { threshold: 0.5 });
    observer.observe(document.getElementById('load-more-trigger'));
  }

  async function toggleLike(reportId, btn) {
    if (!isLoggedIn()) { window.location.href = '/login.html'; return; }
    const res = await api.post(`/reports/${reportId}/like`);
    if (res && res.status === 'success') {
      const icon = btn.querySelector('.material-symbols-outlined');
      const count = btn.querySelector('span:last-child');
      const liked = res.data.liked;
      icon.textContent = liked ? 'favorite' : 'favorite_border';
      icon.style.fontVariationSettings = liked ? "'FILL' 1" : "'FILL' 0";
      count.textContent = res.data.like_count;
      btn.setAttribute('data-liked', liked);
    }
  }




  function toggleVideoSound(video) {
    if (!video || video.tagName !== 'VIDEO') return;
    video.muted = !video.muted;
    // update button icon
    const btn = video.closest('.relative')?.querySelector('.sound-btn');
    if (btn) {
      btn.querySelector('span').textContent = video.muted ? 'volume_off' : 'volume_up';
    }
  }

  // Show sound button when carousel has a video
  function checkVideoSlides() {
    document.querySelectorAll('[id^="carousel-"]').forEach(track => {
      const hasVideo = track.querySelector('video');
      if (hasVideo) {
        const btn = track.closest('.relative')?.querySelector('.sound-btn');
        if (btn) btn.style.display = 'flex';
      }
    });
  }

  function animBtn(el) {
    const span = el.querySelector('span') || el;
    span.style.transition = 'all 0.15s cubic-bezier(0.34,1.56,0.64,1)';
    span.style.color = '#1a373b';
    span.style.transform = 'scale(1.4)';
    setTimeout(() => {
      span.style.transform = 'scale(1)';
      setTimeout(() => { span.style.color = ''; }, 400);
    }, 150);
  }

  function animateBtn(el, color) {
    const span = el.querySelector('span') || el;
    const orig = span.style.color || '';
    span.style.color = color;
    span.style.transform = 'scale(1.35)';
    span.style.transition = 'all 0.15s cubic-bezier(0.34,1.56,0.64,1)';
    setTimeout(() => { span.style.transform = 'scale(1)'; setTimeout(() => { span.style.color = orig; }, 350); }, 150);
  }


  function carouselGoTo(trackId, idx, total) {
    const track = document.getElementById(trackId);
    if (!track) return;
    idx = Math.max(0, Math.min(total - 1, idx));
    track.setAttribute('data-idx', idx);
    track.style.transition = 'transform 0.3s ease';
    track.style.transform = 'translateX(-' + (idx * 100) + '%)';
    track.closest('.carousel-wrap')?.querySelectorAll('.carousel-dot').forEach(function(d, i) {
      d.style.width = i === idx ? '14px' : '6px';
      d.style.opacity = i === idx ? '1' : '0.55';
    });
  }
  function carouselPrev(id, total, e) { e.stopPropagation(); const t=document.getElementById(id); carouselGoTo(id,(parseInt(t?.getAttribute('data-idx'))||0)-1,total); }
  function carouselNext(id, total, e) { e.stopPropagation(); const t=document.getElementById(id); carouselGoTo(id,(parseInt(t?.getAttribute('data-idx'))||0)+1,total); }

  function closeAllMenus() { document.querySelectorAll('._float-menu').forEach(m=>m.remove()); }
  document.addEventListener('click', closeAllMenus);

  function toggleShareMenu(e, reportId, title, loc) {
    e.stopPropagation(); closeAllMenus();
    const url = window.location.origin + '/report-detail.html?id=' + reportId;
    const text = encodeURIComponent((loc ? loc + ' - ' : '') + title + ' | Winemu');
    const encUrl = encodeURIComponent(url);

  function toggleReportMenu(e, reportId) {
    e.stopPropagation(); closeAllMenus();
    const VIOLATIONS = [
      'Konten pornografi',
      'Perilaku pengguna tidak pantas',
      'Informasi palsu / hoaks',
      'Spam berlebihan',
      'Konten berbahaya / kekerasan',
      'Penipuan / scam',
    ];
    const menu = document.createElement('div');
    menu.className = '_float-menu';
    menu.style.cssText = 'position:absolute;top:36px;right:0;background:#fff;border:1px solid #c1c8c9;border-radius:1rem;box-shadow:0 8px 32px rgba(0,0,0,0.12);padding:8px;z-index:200;min-width:215px;';
    const title = document.createElement('p');
    title.style.cssText = 'font-size:11px;color:#727879;padding:4px 12px 6px;font-weight:600;letter-spacing:0.05em;';
    title.textContent = 'LAPORKAN';
    menu.appendChild(title);
    VIOLATIONS.forEach(function(v, i) {
      const btn = document.createElement('button');
      btn.style.cssText = 'display:flex;align-items:center;gap:8px;width:100%;padding:8px 12px;border:none;background:none;cursor:pointer;border-radius:8px;font-size:13px;text-align:left;';
      btn.onmouseover = function() { this.style.background = '#f0ede9'; };
      btn.onmouseout  = function() { this.style.background = 'none'; };
      btn.innerHTML = '<span class="material-symbols-outlined" style="font-size:15px;color:#ba1a1a;">flag</span>' + v;
      btn.onclick = function() { submitFlagReport(reportId, i, v, this); };
      menu.appendChild(btn);
    });
    e.currentTarget.closest('.relative').appendChild(menu);
  }

  function submitFlagReport(reportId, catId, catName, btn) {
    btn.closest('._float-menu').remove();
    api.post('/reports/'+reportId+'/flag',{category:catName}).then(()=>showToast('Laporan terkirim!')).catch(()=>showToast('Gagal mengirim laporan'));
  }

  async function shareReport(reportId, title, location) {
    const url = window.location.origin + '/report-detail.html?id=' + reportId;
    if (navigator.share) {
      try {
        await navigator.share({ title: title, text: (location ? location + ' - ' : '') + 'Laporan di Winemu', url });
      } catch(e) { if (e.name !== 'AbortError') showToast('Gagal berbagi'); }
    } else {
      await navigator.clipboard.writeText(url);
      showToast('Link disalin ke clipboard!');
    }
    // update share count
    api.post('/reports/' + reportId + '/share').catch(() => {});
  }

  async function toggleBookmark(reportId, btn) {
    if (!isLoggedIn()) { window.location.href = '/login.html'; return; }
    const icon = btn.querySelector('.material-symbols-outlined');
    const isBookmarked = icon.textContent === 'bookmark';
    if (isBookmarked) {
      await api.delete(`/users/bookmarks/${reportId}`);
      icon.textContent = 'bookmark_border';
      btn.style.color = '#314E52';
      showToast('Bookmark dihapus');
    } else {
      await api.post(`/users/bookmarks/${reportId}`);
      icon.textContent = 'bookmark';
      btn.style.color = '#7d562d';
      showToast('Ditambahkan ke bookmark ✓');
    }
  }

  function openReport(id) {
    window.location.href = `/report-detail.html?id=${id}`;
  }

  function loadNearbyUsers() {
    if (!isLoggedIn()) return;
    if (!navigator.geolocation) return;

    navigator.geolocation.getCurrentPosition(
      async (position) => {
        const { latitude, longitude } = position.coords;
        const res = await api.get(`/users/nearby?lat=${latitude}&lng=${longitude}&radius=15&limit=10`);
        renderNearbyUsers(res?.data?.users || []);
      },
      () => {
        // Izin lokasi ditolak atau gagal - cukup sembunyikan section ini,
        // tidak perlu mengganggu pengalaman feed dengan alert error.
        document.getElementById('nearby-users-section').classList.add('hidden');
      },
      { timeout: 8000, maximumAge: 300000 }
    );
  }

  function renderNearbyUsers(users) {
    const section = document.getElementById('nearby-users-section');
    const list = document.getElementById('nearby-users-list');

    if (!users.length) {
      section.classList.add('hidden');
      return;
    }

    list.innerHTML = users.map(u => {
      const avatar = u.avatar_url
        ? `<img src="${u.avatar_url}" class="w-16 h-16 rounded-full object-cover border-2 border-surface-container-lowest shadow-sm">`
        : `<div class="w-16 h-16 rounded-full bg-primary-container text-white flex items-center justify-center text-xl font-bold border-2 border-surface-container-lowest shadow-sm">${(u.full_name||u.username||'?')[0].toUpperCase()}</div>`;
      const firstName = (u.full_name || u.username || '').split(' ')[0];
      return `<div onclick="window.location.href='/user-profile.html?id=${u.id}'" class="flex flex-col items-center gap-1.5 flex-shrink-0 w-20 cursor-pointer">
        ${avatar}
        <span class="text-xs font-semibold text-on-surface truncate w-full text-center">${firstName}</span>
        <span class="text-[10px] text-on-surface-variant">${u.distance_km} km</span>
      </div>`;
    }).join('');

    section.classList.remove('hidden');
  }
</script>
