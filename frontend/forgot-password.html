<!DOCTYPE html>
<html class="light" lang="id">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="/js/device-redirect.js"></script>
<title>Winemu - Lupa Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Philosopher:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script>
tailwind.config={darkMode:"class",theme:{extend:{colors:{
  "surface-container-lowest":"#ffffff","surface":"#fcf9f4","primary-container":"#314e52",
  "on-primary":"#ffffff","outline-variant":"#c1c8c9","on-surface":"#1c1c19","outline":"#727879",
  "primary":"#1a373b","on-surface-variant":"#414849","primary-fixed-dim":"#adccd1"
},fontFamily:{"headline-md":["Philosopher"],"body-sm":["Plus Jakarta Sans"],"body-md":["Plus Jakarta Sans"]},
fontSize:{"headline-md":["24px",{"lineHeight":"1.3","fontWeight":"700"}],"body-sm":["14px",{"lineHeight":"1.5","fontWeight":"400"}],"body-md":["16px",{"lineHeight":"1.6","fontWeight":"400"}]}}}}
</script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;display:inline-block;line-height:1;}.custom-shadow{box-shadow:0 20px 40px rgba(49,78,82,0.05);}</style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col items-center justify-center p-6">
<main class="w-full max-w-md flex flex-col items-center gap-8">
  <a href="/" class="font-headline-md text-2xl text-primary">Winemu</a>
  <div class="w-full bg-surface-container-lowest rounded-2xl custom-shadow p-8 flex flex-col items-center text-center" id="form-view">
    <div class="w-16 h-16 rounded-full bg-primary-fixed-dim/30 flex items-center justify-center mb-4">
      <span class="material-symbols-outlined text-primary text-3xl">lock_reset</span>
    </div>
    <h1 class="font-headline-md text-headline-md text-primary mb-2">Lupa Password?</h1>
    <p class="text-on-surface-variant text-sm mb-6">Masukkan email Anda dan kami akan mengirimkan tautan untuk mengatur ulang password.</p>
    <input id="email" type="email" placeholder="Alamat Email" class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-fixed-dim/30 mb-4">
    <p id="error-msg" class="text-red-600 text-sm hidden mb-2"></p>
    <button onclick="handleSubmit()" id="submit-btn" class="w-full py-3 bg-primary-container text-on-primary rounded-xl font-bold shadow-lg hover:shadow-xl transition-all">Kirim Tautan Reset</button>
    <a href="/login.html" class="text-primary text-sm font-semibold mt-4 hover:underline">Kembali ke halaman masuk</a>
  </div>
  <div class="hidden w-full bg-surface-container-lowest rounded-2xl custom-shadow p-8 flex flex-col items-center text-center" id="success-view">
    <div class="w-16 h-16 rounded-full bg-green-100 flex items-center justify-center mb-4">
      <span class="material-symbols-outlined text-green-600 text-3xl">mark_email_read</span>
    </div>
    <h1 class="font-headline-md text-headline-md text-primary mb-2">Periksa Email Anda</h1>
    <p class="text-on-surface-variant text-sm mb-6">Jika alamat email terdaftar, tautan untuk mengatur ulang password telah dikirimkan.</p>
    <a href="/login.html" class="w-full py-3 bg-primary-container text-on-primary rounded-xl font-bold text-center shadow-lg hover:shadow-xl transition-all">Kembali ke Masuk</a>
  </div>
</main>
<script src="/js/api.js"></script>
<script>
  async function handleSubmit() {
    const email = document.getElementById('email').value.trim();
    const errEl = document.getElementById('error-msg');
    errEl.classList.add('hidden');
    if (!email) { errEl.textContent = 'Email wajib diisi'; errEl.classList.remove('hidden'); return; }

    const btn = document.getElementById('submit-btn');
    btn.textContent = 'Mengirim...'; btn.disabled = true;

    const res = await api.post('/auth/forgot-password', { email });
    if (res?.status === 'success') {
      document.getElementById('form-view').classList.add('hidden');
      document.getElementById('success-view').classList.remove('hidden');
    } else {
      errEl.textContent = res?.message || 'Terjadi kesalahan';
      errEl.classList.remove('hidden');
      btn.textContent = 'Kirim Tautan Reset'; btn.disabled = false;
    }
  }
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });
</script>
</body>
</html>
