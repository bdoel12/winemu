<!DOCTYPE html>
<html class="light" lang="id">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="/js/device-redirect.js"></script>
<title>Winemu - Daftar</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Philosopher:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    darkMode: "class",
    theme: { extend: {
      colors: {
        "surface-container-lowest":"#ffffff","on-tertiary":"#ffffff","surface":"#fcf9f4",
        "error":"#ba1a1a","primary-fixed-dim":"#adccd1","on-primary":"#ffffff",
        "surface-variant":"#e5e2dd","background":"#fcf9f4","primary-container":"#314e52",
        "on-primary-container":"#a0bec3","outline-variant":"#c1c8c9","surface-bright":"#fcf9f4",
        "on-surface":"#1c1c19","inverse-primary":"#adccd1","secondary-container":"#ffca98",
        "outline":"#727879","primary":"#1a373b","on-surface-variant":"#414849","secondary":"#7d562d",
        "surface-container-low":"#f6f3ee","surface-container-high":"#ebe8e3","surface-container":"#f0ede9"
      },
      fontFamily: { "headline-md":["Philosopher"],"body-sm":["Plus Jakarta Sans"],"body-md":["Plus Jakarta Sans"] },
      fontSize: {
        "headline-md":["24px",{"lineHeight":"1.3","fontWeight":"700"}],
        "body-sm":["14px",{"lineHeight":"1.5","fontWeight":"400"}],
        "body-md":["16px",{"lineHeight":"1.6","fontWeight":"400"}]
      }
    }}
  }
</script>
<style>
  .material-symbols-outlined { font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24; display:inline-block; line-height:1; }
  .custom-shadow { box-shadow: 0 20px 40px rgba(49,78,82,0.05); }
  @keyframes blob {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -20px) scale(1.1); }
    66% { transform: translate(-20px, 20px) scale(0.95); }
  }
  .animate-blob { animation: blob 12s ease-in-out infinite; }
  .animation-delay-2000 { animation-delay: 2s; }
</style>
</head>
<body class="bg-surface text-on-surface font-body-md min-h-screen flex flex-col items-center justify-center relative overflow-x-hidden">
  <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0 opacity-30">
    <div class="absolute -top-24 -right-24 w-64 h-64 bg-primary-fixed rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob"></div>
    <div class="absolute top-1/4 -left-24 w-72 h-72 bg-secondary-fixed rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-2000"></div>
  </div>
  <main class="w-full max-w-md px-6 py-12 z-10 flex flex-col relative">
    <header class="flex justify-center mb-6">
      <a href="/" class="font-headline-md text-2xl text-primary">Winemu</a>
    </header>
    <div class="bg-surface-container-lowest rounded-2xl custom-shadow p-6 sm:p-8 flex flex-col w-full border border-surface-variant">
      <div class="mb-6">
        <h1 class="font-headline-md text-headline-md text-primary mb-1">Daftar Akun</h1>
        <p class="font-body-sm text-body-sm text-on-surface-variant mb-3">Mulai perjalanan menemukan barang Anda.</p>
        <div class="font-body-sm text-body-sm text-on-surface-variant">
          Sudah punya akun? <a href="/login.html" class="text-primary font-bold hover:underline">Masuk</a>
        </div>
      </div>
      <div class="space-y-4" id="register-form">
        <input id="fullname" type="text" placeholder="Nama Lengkap" class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-fixed-dim/30 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant transition-all"/>
        <input id="username" type="text" placeholder="Username" class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-fixed-dim/30 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant transition-all"/>
        <input id="email" type="email" placeholder="Alamat Email" class="w-full px-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-xl focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-fixed-dim/30 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant transition-all"/>
        <div class="relative">
          <input id="password" type="password" placeholder="Buat Password" class="w-full px-4 py-3 pr-10 bg-surface-container-lowest border border-outline-variant rounded-xl focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-fixed-dim/30 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant transition-all"/>
          <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary" onclick="togglePass('password', this)">
            <span class="material-symbols-outlined text-[20px]">visibility_off</span>
          </button>
        </div>
        <div class="relative mb-2">
          <input id="confirm_password" type="password" placeholder="Konfirmasi Password" class="w-full px-4 py-3 pr-10 bg-surface-container-lowest border border-outline-variant rounded-xl focus:outline-none focus:border-primary-container focus:ring-2 focus:ring-primary-fixed-dim/30 font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant transition-all"/>
          <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary" onclick="togglePass('confirm_password', this)">
            <span class="material-symbols-outlined text-[20px]">visibility_off</span>
          </button>
        </div>
        <p id="error-msg" class="text-red-600 text-sm hidden"></p>
        <button onclick="handleRegister()" id="submit-btn" class="w-full py-3 px-6 bg-primary-container text-on-primary rounded-xl font-body-md shadow-lg hover:shadow-xl hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200">
          Daftar Sekarang
        </button>
      </div>
      <div class="flex items-center my-6">
        <div class="flex-1 border-t border-surface-variant"></div>
        <span class="px-4 font-body-sm text-body-sm text-on-surface-variant bg-surface-container-lowest">Atau daftar dengan</span>
        <div class="flex-1 border-t border-surface-variant"></div>
      </div>
      <div class="flex gap-4">
        <button class="flex-1 flex items-center justify-center gap-2 py-2.5 bg-surface-container-lowest border border-outline-variant rounded-xl hover:bg-surface-container-low transition-colors" type="button">
          <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
          <span class="font-body-md text-on-surface">Google</span>
        </button>
        <button class="flex-1 flex items-center justify-center gap-2 py-2.5 bg-surface-container-lowest border border-outline-variant rounded-xl hover:bg-surface-container-low transition-colors" type="button">
          <svg class="w-5 h-5 text-[#1877F2]" fill="currentColor" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
          <span class="font-body-md text-on-surface">Facebook</span>
        </button>
      </div>
    </div>
  </main>
<script src="/js/api.js"></script>
<script>
  if (api.getToken()) window.location.href = '/feed.html';

  function togglePass(id, btn) {
    const inp = document.getElementById(id);
    const icon = btn.querySelector('.material-symbols-outlined');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    icon.textContent = inp.type === 'password' ? 'visibility_off' : 'visibility';
  }

  async function handleRegister() {
    const btn = document.getElementById('submit-btn');
    const errEl = document.getElementById('error-msg');
    errEl.classList.add('hidden');

    const full_name = document.getElementById('fullname').value.trim();
    const username = document.getElementById('username').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm_password').value;

    if (!username || !email || !password) { errEl.textContent = 'Semua field wajib diisi'; errEl.classList.remove('hidden'); return; }
    if (password !== confirm) { errEl.textContent = 'Password tidak cocok'; errEl.classList.remove('hidden'); return; }
    if (password.length < 6) { errEl.textContent = 'Password minimal 6 karakter'; errEl.classList.remove('hidden'); return; }

    btn.textContent = 'Memproses...';
    btn.disabled = true;

    const result = await api.post('/auth/register', { full_name, username, email, password });

    if (result && result.status === 'success') {
      api.setTokens(result.data.access_token, result.data.refresh_token);
      api.setUser(result.data.user);
      showToast('Registrasi berhasil! Selamat datang di Winemu 🎉');
      setTimeout(() => window.location.href = '/feed.html', 1000);
    } else {
      errEl.textContent = result?.message || 'Registrasi gagal';
      errEl.classList.remove('hidden');
      btn.textContent = 'Daftar Sekarang';
      btn.disabled = false;
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleRegister(); });
</script>
</body>
</html>
